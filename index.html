<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Backrooms - The Observer's Maze</title>
    <style>
        :root {
            --bg: #0a0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            cursor: default;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            height: 100vh;
            width: 100vw;
            touch-action: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.65) 100%);
            transition: opacity 0.3s;
        }

        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9;
            pointer-events: none;
            box-shadow: inset 0 0 180px 60px rgba(0, 0, 0, 0.8);
            border-radius: 0;
        }

        #chromatic {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 8;
            pointer-events: none;
            background: transparent;
            mix-blend-mode: overlay;
            opacity: 0.08;
            animation: chromaticDrift 7s ease-in-out infinite;
        }

        @keyframes chromaticDrift {
            0%,
            100% {
                background: transparent;
            }
            25% {
                background: rgba(255, 0, 0, 0.03);
            }
            50% {
                background: transparent;
            }
            75% {
                background: rgba(0, 100, 255, 0.03);
            }
        }

        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
            pointer-events: all;
        }

        #splash.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        #splash h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            color: #e8d5a3;
            letter-spacing: 0.3em;
            text-align: center;
            margin-bottom: 0.5em;
            text-shadow: 0 0 60px rgba(232, 213, 163, 0.5), 0 0 120px rgba(200, 170, 100, 0.3);
            animation: titlePulse 3s ease-in-out infinite;
            font-weight: 300;
        }

        @keyframes titlePulse {
            0%,
            100% {
                text-shadow: 0 0 60px rgba(232, 213, 163, 0.5), 0 0 120px rgba(200, 170, 100, 0.3);
            }
            50% {
                text-shadow: 0 0 80px rgba(232, 213, 163, 0.8), 0 0 160px rgba(200, 170, 100, 0.5);
            }
        }

        #splash .subtitle {
            font-size: clamp(0.7rem, 1.5vw, 1rem);
            color: #b8a080;
            letter-spacing: 0.5em;
            text-align: center;
            margin-bottom: 3em;
            opacity: 0.7;
        }

        #splash .enter-btn {
            padding: 1em 3em;
            font-size: 1.1rem;
            letter-spacing: 0.4em;
            color: #e8d5a3;
            background: transparent;
            border: 1px solid #e8d5a3;
            cursor: pointer;
            transition: all 0.4s;
            font-family: inherit;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        #splash .enter-btn:hover {
            background: rgba(232, 213, 163, 0.1);
            box-shadow: 0 0 40px rgba(232, 213, 163, 0.3);
            letter-spacing: 0.6em;
        }

        #splash .enter-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(232, 213, 163, 0.15) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s;
        }
        #splash .enter-btn:hover::after {
            opacity: 1;
        }

        #hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            pointer-events: none;
            color: rgba(200, 180, 150, 0.5);
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            transition: opacity 2s;
            font-family: 'Courier New', monospace;
        }

        #jumpscare-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            pointer-events: none;
            background: #000;
            opacity: 0;
            transition: opacity 0.08s;
        }
    </style>
</head>
<body>

    <div id="splash">
        <h1>QUANTUM<br>BACKROOMS</h1>
        <p class="subtitle">THE OBSERVER'S MAZE</p>
        <button class="enter-btn" id="enterBtn">Enter</button>
    </div>

    <div id="overlay"></div>
    <div id="vignette"></div>
    <div id="chromatic"></div>
    <div id="jumpscare-flash"></div>
    <div id="hint"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ─────────────────────────────────────
        // DOM ELEMENTS
        // ─────────────────────────────────────
        const splashEl = document.getElementById('splash');
        const enterBtn = document.getElementById('enterBtn');
        const hintEl = document.getElementById('hint');
        const jumpscareFlash = document.getElementById('jumpscare-flash');
        const overlayEl = document.getElementById('overlay');
        const vignetteEl = document.getElementById('vignette');

        // ─────────────────────────────────────
        // THREE.JS SETUP
        // ─────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        scene.fog = new THREE.FogExp2(0x0a0a0a, 0.00025);

        const camera = new THREE.PerspectiveCamera(82, window.innerWidth / window.innerHeight, 0.15, 80);
        camera.position.set(2.5, 1.6, 2.5);
        camera.rotation.order = 'YXZ';

        // ─────────────────────────────────────
        // AUDIO SYSTEM
        // ─────────────────────────────────────
        const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
        let audioStarted = false;

        function startAudio() {
            if (!audioStarted) {
                audioCtx.resume();
                audioStarted = true;
                createAmbientHum();
            }
        }

        let humOsc, humGain, humFilter;
        let ambientNoiseNode;

        function createAmbientHum() {
            humFilter = audioCtx.createBiquadFilter();
            humFilter.type = 'lowpass';
            humFilter.frequency.value = 200;
            humFilter.Q.value = 1;

            humOsc = audioCtx.createOscillator();
            humOsc.type = 'sawtooth';
            humOsc.frequency.value = 55;

            const subOsc = audioCtx.createOscillator();
            subOsc.type = 'sine';
            subOsc.frequency.value = 28;

            humGain = audioCtx.createGain();
            humGain.gain.value = 0.04;

            const subGain = audioCtx.createGain();
            subGain.gain.value = 0.03;

            humOsc.connect(humFilter);
            humFilter.connect(humGain);
            humGain.connect(audioCtx.destination);

            subOsc.connect(subGain);
            subGain.connect(audioCtx.destination);

            humOsc.start();
            subOsc.start();

            // Noise for atmosphere
            const bufferSize = audioCtx.sampleRate * 2;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.02;
            }
            ambientNoiseNode = audioCtx.createBufferSource();
            ambientNoiseNode.buffer = noiseBuffer;
            ambientNoiseNode.loop = true;
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.value = 0.015;
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'bandpass';
            noiseFilter.frequency.value = 800;
            noiseFilter.Q.value = 0.5;
            ambientNoiseNode.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            ambientNoiseNode.start();
        }

        function playThud(volume = 0.3, freq = 60) {
            if (!audioStarted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function playJumpscareSound() {
            if (!audioStarted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.6);
            gain.gain.setValueAtTime(0.7, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.7);
            const distort = audioCtx.createWaveShaper();
            distort.curve = new Float32Array([-1, -0.8, -0.3, 0, 0.3, 0.8, 1]);
            osc.connect(distort);
            distort.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.7);
        }

        function playDistantDoor() {
            if (!audioStarted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 1.2);
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.3);
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 300;
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.3);
        }

        function playHeartbeat() {
            if (!audioStarted) return;
            const now = audioCtx.currentTime;
            for (let i = 0; i < 3; i++) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = 35;
                const t = now + i * 0.25;
                gain.gain.setValueAtTime(0.25, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(t);
                osc.stop(t + 0.2);
            }
        }

        // ─────────────────────────────────────
        // GAME STATE
        // ─────────────────────────────────────
        const GAME_STATE = {
            currentLevel: 1,
            maxLevel: 5,
            gridSize: 6,
            roomSize: 5.5,
            wallHeight: 3.2,
            playerHasKey: false,
            keyPosition: null,
            exitPosition: null,
            startPosition: null,
            gameActive: false,
            levelComplete: false,
            totalChaos: 0,
            quantumInstability: 0,
            jumpscareCooldown: 0,
            screenShakeAmount: 0,
            lastTunnelTime: 0,
            tunnelCooldown: 2.5,
            heartbeating: false,
            heartbeatTimer: 0,
        };

        // ─────────────────────────────────────
        // MAZE DATA
        // ─────────────────────────────────────
        let horizontalWalls = []; // [row][col] - wall between (row,col) and (row+1,col)
        let verticalWalls = []; // [row][col] - wall between (row,col) and (row,col+1)
        let wallTypes = {}; // key: "h-row-col" or "v-row-col" -> 'solid' | 'open' | 'quantum'
        let wallLastObserved = {}; // timestamp of last observation
        let wallMeshes = {}; // Three.js mesh references
        let cellLightFlicker = []; // [row][col] flicker state
        let cellLightMeshes = []; // [row][col] mesh refs

        const mazeGroup = new THREE.Group();
        const wallsGroup = new THREE.Group();
        const lightsGroup = new THREE.Group();
        const floorGroup = new THREE.Group();
        const ceilingGroup = new THREE.Group();
        mazeGroup.add(wallsGroup);
        mazeGroup.add(lightsGroup);
        mazeGroup.add(floorGroup);
        mazeGroup.add(ceilingGroup);
        scene.add(mazeGroup);

        // ─────────────────────────────────────
        // MATERIALS
        // ─────────────────────────────────────
        const wallMaterial = new THREE.MeshStandardMaterial({
            color: 0xd4c08a,
            roughness: 0.75,
            metalness: 0.05,
        });

        const wallMaterialAlt = new THREE.MeshStandardMaterial({
            color: 0xc8b478,
            roughness: 0.8,
            metalness: 0.04,
        });

        const floorMaterial = new THREE.MeshStandardMaterial({
            color: 0x3a3530,
            roughness: 0.55,
            metalness: 0.08,
        });

        const ceilingMaterial = new THREE.MeshStandardMaterial({
            color: 0x4a4540,
            roughness: 0.7,
            metalness: 0.1,
        });

        const doorFrameMaterial = new THREE.MeshStandardMaterial({
            color: 0x8a7a60,
            roughness: 0.5,
            metalness: 0.3,
        });

        // ─────────────────────────────────────
        // LIGHTING
        // ─────────────────────────────────────
        const ambientLight = new THREE.AmbientLight(0x2a2520, 0.7);
        scene.add(ambientLight);

        const globalPointLight = new THREE.PointLight(0xffeedd, 8, 30, 1.5);
        globalPointLight.position.set(15, 6, 15);
        globalPointLight.castShadow = true;
        globalPointLight.shadow.mapSize.width = 512;
        globalPointLight.shadow.mapSize.height = 512;
        globalPointLight.shadow.camera.near = 0.3;
        globalPointLight.shadow.camera.far = 50;
        globalPointLight.shadow.bias = -0.0005;
        scene.add(globalPointLight);

        // ─────────────────────────────────────
        // PLAYER
        // ─────────────────────────────────────
        const playerVelocity = new THREE.Vector3();
        const playerPosition = new THREE.Vector3();
        const playerEuler = { x: 0, y: 0 };
        const keysPressed = {};
        let pointerLocked = false;

        function resetPlayer() {
            const gs = GAME_STATE.gridSize;
            const rs = GAME_STATE.roomSize;
            const sx = GAME_STATE.startPosition?.col ?? 0;
            const sy = GAME_STATE.startPosition?.row ?? 0;
            playerPosition.set(sx * rs + rs / 2, 1.6, sy * rs + rs / 2);
            playerVelocity.set(0, 0, 0);
            playerEuler.x = 0;
            playerEuler.y = Math.PI / 4;
            camera.position.copy(playerPosition);
            camera.rotation.set(0, playerEuler.y, 0);
        }

        // ─────────────────────────────────────
        // SHADOW ENTITIES
        // ─────────────────────────────────────
        const entities = [];
        const entityGroup = new THREE.Group();
        scene.add(entityGroup);

        function createEntityMesh() {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({
                color: 0x080808,
                roughness: 1,
                metalness: 0,
                transparent: true,
                opacity: 0.85,
            });
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.35, 1.0, 4, 8), bodyMat);
            body.position.y = 1.1;
            body.castShadow = true;
            group.add(body);

            const head = new THREE.Mesh(new THREE.SphereGeometry(0.28, 8, 6), bodyMat);
            head.position.y = 2.0;
            head.castShadow = true;
            group.add(head);

            const limbMat = new THREE.MeshStandardMaterial({
                color: 0x050505,
                roughness: 1,
                metalness: 0,
                transparent: true,
                opacity: 0.7,
            });
            for (let i = -1; i <= 1; i += 2) {
                const arm = new THREE.Mesh(new THREE.CapsuleGeometry(0.1, 0.7, 4, 6), limbMat);
                arm.position.set(i * 0.4, 1.5, 0);
                arm.rotation.z = i * 0.3;
                group.add(arm);
            }

            group.userData = {
                bodyMesh: body,
                headMesh: head,
                baseOpacity: 0.85,
                animationPhase: Math.random() * Math.PI * 2,
                animationSpeed: 0.4 + Math.random() * 0.8,
            };
            return group;
        }

        function spawnEntity(row, col, distanceFromPlayer = 8) {
            const rs = GAME_STATE.roomSize;
            const ex = col * rs + rs / 2;
            const ez = row * rs + rs / 2;
            const mesh = createEntityMesh();
            mesh.position.set(ex, 0, ez);
            mesh.visible = true;
            mesh.userData.gridRow = row;
            mesh.userData.gridCol = col;
            mesh.userData.spawnTime = performance.now() / 1000;
            mesh.userData.state = 'idle'; // 'idle' | 'stalking' | 'charging' | 'vanishing'
            mesh.userData.chargeTarget = null;
            mesh.userData.vanished = false;
            entityGroup.add(mesh);
            entities.push(mesh);
            return mesh;
        }

        function despawnEntity(entity) {
            entity.userData.state = 'vanishing';
            entity.userData.vanished = true;
            entity.userData.vanishStart = performance.now() / 1000;
        }

        function cleanupEntities() {
            const now = performance.now() / 1000;
            for (let i = entities.length - 1; i >= 0; i--) {
                const e = entities[i];
                if (e.userData.vanished && now - e.userData.vanishStart > 0.5) {
                    entityGroup.remove(e);
                    if (e.userData.bodyMesh) e.userData.bodyMesh.material.dispose();
                    entities.splice(i, 1);
                }
            }
        }

        // ─────────────────────────────────────
        // KEY & EXIT MESHES
        // ─────────────────────────────────────
        const keyGroup = new THREE.Group();
        const exitGroup = new THREE.Group();
        scene.add(keyGroup);
        scene.add(exitGroup);

        let keyMesh = null;
        let exitMarkerMesh = null;

        function createKeyMesh() {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({
                color: 0xffd700,
                roughness: 0.2,
                metalness: 0.9,
                emissive: 0xffd700,
                emissiveIntensity: 0.6,
            });
            const bow = new THREE.Mesh(new THREE.TorusGeometry(0.22, 0.06, 8, 12), mat);
            bow.rotation.x = Math.PI / 2;
            group.add(bow);
            const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.5, 8), mat);
            shaft.position.y = -0.25;
            group.add(shaft);
            const bit = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.15, 0.06), mat);
            bit.position.y = -0.48;
            group.add(bit);

            const glowLight = new THREE.PointLight(0xffd700, 1.5, 4, 2);
            glowLight.position.y = 0;
            group.add(glowLight);

            group.userData = { glowLight, baseY: 0 };
            return group;
        }

        function createExitMarker() {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({
                color: 0x00cc88,
                roughness: 0.2,
                metalness: 0.7,
                emissive: 0x00cc88,
                emissiveIntensity: 0.5,
            });
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.08, 16, 32), mat);
            ring.rotation.x = Math.PI / 2;
            ring.position.y = 0.1;
            group.add(ring);

            const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 2.5, 8), mat);
            pillar.position.y = 1.25;
            group.add(pillar);

            const glowLight = new THREE.PointLight(0x00cc88, 2, 6, 2);
            glowLight.position.y = 1.5;
            group.add(glowLight);

            group.userData = { glowLight };
            return group;
        }

        function placeKey(row, col) {
            keyGroup.clear();
            if (keyMesh) {
                keyMesh.userData?.glowLight?.dispose();
                keyMesh.traverse(c => { if (c.material && c.material !== keyMesh.userData?.glowLight?.material) c.material
                        .dispose(); });
            }
            keyMesh = createKeyMesh();
            const rs = GAME_STATE.roomSize;
            keyMesh.position.set(col * rs + rs / 2, 1.3, row * rs + rs / 2);
            keyMesh.userData.baseY = keyMesh.position.y;
            keyMesh.userData.gridRow = row;
            keyMesh.userData.gridCol = col;
            keyGroup.add(keyMesh);
            GAME_STATE.keyPosition = { row, col };
        }

        function placeExit(row, col) {
            exitGroup.clear();
            if (exitMarkerMesh) {
                exitMarkerMesh.userData?.glowLight?.dispose();
                exitMarkerMesh.traverse(c => { if (c.material && c.material !== exitMarkerMesh.userData?.glowLight
                        ?.material) c.material.dispose(); });
            }
            exitMarkerMesh = createExitMarker();
            const rs = GAME_STATE.roomSize;
            exitMarkerMesh.position.set(col * rs + rs / 2, 0, row * rs + rs / 2);
            exitMarkerMesh.userData.gridRow = row;
            exitMarkerMesh.userData.gridCol = col;
            exitGroup.add(exitMarkerMesh);
            GAME_STATE.exitPosition = { row, col };
        }

        // ─────────────────────────────────────
        // MAZE GENERATION
        // ─────────────────────────────────────
        function clearMaze() {
            wallsGroup.clear();
            lightsGroup.clear();
            floorGroup.clear();
            ceilingGroup.clear();
            wallMeshes = {};
            wallTypes = {};
            wallLastObserved = {};
            cellLightFlicker = [];
            cellLightMeshes = [];
            entities.forEach(e => entityGroup.remove(e));
            entities.length = 0;
            keyGroup.clear();
            exitGroup.clear();
            keyMesh = null;
            exitMarkerMesh = null;
        }

        function disposeMaterial(obj) {
            obj.traverse(child => {
                if (child.material) {
                    if (Array.isArray(child.material)) {
                        child.material.forEach(m => m.dispose());
                    } else {
                        child.material.dispose();
                    }
                }
                if (child.geometry) child.geometry.dispose();
            });
        }

        function generateMaze(level) {
            clearMaze();
            const gs = GAME_STATE.gridSize;
            const rs = GAME_STATE.roomSize;
            const wh = GAME_STATE.wallHeight;
            const wallThickness = 0.2;

            // Initialize wall arrays
            horizontalWalls = [];
            verticalWalls = [];
            for (let r = 0; r < gs; r++) {
                horizontalWalls[r] = [];
                verticalWalls[r] = [];
                for (let c = 0; c < gs; c++) {
                    if (r < gs - 1) horizontalWalls[r][c] = 'solid';
                    if (c < gs - 1) verticalWalls[r][c] = 'solid';
                }
            }

            // Generate maze paths using recursive backtracker
            const visited = Array.from({ length: gs }, () => Array(gs).fill(false));
            const stack = [];
            const startR = 0,
                startC = 0;
            visited[startR][startC] = true;
            stack.push({ r: startR, c: startC });

            const directions = [
                { dr: -1, dc: 0, wallType: 'h', wallR: (r, c) => r - 1, wallC: (r, c) => c },
                { dr: 1, dc: 0, wallType: 'h', wallR: (r, c) => r, wallC: (r, c) => c },
                { dr: 0, dc: -1, wallType: 'v', wallR: (r, c) => r, wallC: (r, c) => c - 1 },
                { dr: 0, dc: 1, wallType: 'v', wallR: (r, c) => r, wallC: (r, c) => c },
            ];

            while (stack.length > 0) {
                const current = stack[stack.length - 1];
                const { r, c } = current;
                const neighbors = [];
                for (const d of directions) {
                    const nr = r + d.dr;
                    const nc = c + d.dc;
                    if (nr >= 0 && nr < gs && nc >= 0 && nc < gs && !visited[nr][nc]) {
                        neighbors.push({ nr, nc, ...d });
                    }
                }
                if (neighbors.length === 0) {
                    stack.pop();
                } else {
                    const chosen = neighbors[Math.floor(Math.random() * neighbors.length)];
                    visited[chosen.nr][chosen.nc] = true;
                    // Remove wall between current and chosen
                    const wr = chosen.wallR(r, c);
                    const wc = chosen.wallC(r, c);
                    if (chosen.wallType === 'h' && wr >= 0 && wr < gs - 1 && wc >= 0 && wc < gs) {
                        horizontalWalls[wr][wc] = 'open';
                    } else if (chosen.wallType === 'v' && wr >= 0 && wr < gs && wc >= 0 && wc < gs - 1) {
                        verticalWalls[wr][wc] = 'open';
                    }
                    stack.push({ r: chosen.nr, c: chosen.nc });
                }
            }

            // Add extra connections to create loops
            const extraConnections = Math.floor(gs * gs * 0.15);
            for (let i = 0; i < extraConnections; i++) {
                const r = Math.floor(Math.random() * gs);
                const c = Math.floor(Math.random() * gs);
                const isH = Math.random() < 0.5;
                if (isH && r < gs - 1 && horizontalWalls[r][c] === 'solid') {
                    horizontalWalls[r][c] = 'open';
                } else if (!isH && c < gs - 1 && verticalWalls[r][c] === 'solid') {
                    verticalWalls[r][c] = 'open';
                }
            }

            // Convert some open walls to quantum based on level
            const quantumFraction = 0.15 + level * 0.12;
            const allWallKeys = [];
            for (let r = 0; r < gs - 1; r++)
                for (let c = 0; c < gs; c++)
                    if (horizontalWalls[r][c] === 'open') allWallKeys.push({ type: 'h', r, c });
            for (let r = 0; r < gs; r++)
                for (let c = 0; c < gs - 1; c++)
                    if (verticalWalls[r][c] === 'open') allWallKeys.push({ type: 'v', r, c });

            const numQuantum = Math.floor(allWallKeys.length * quantumFraction);
            const shuffled = [...allWallKeys].sort(() => Math.random() - 0.5);
            for (let i = 0; i < Math.min(numQuantum, shuffled.length); i++) {
                const wk = shuffled[i];
                const key = `${wk.type}-${wk.r}-${wk.c}`;
                wallTypes[key] = 'quantum';
                if (wk.type === 'h') horizontalWalls[wk.r][wk.c] = 'quantum';
                else verticalWalls[wk.r][wk.c] = 'quantum';
            }

            // Mark remaining walls
            for (let r = 0; r < gs - 1; r++) {
                for (let c = 0; c < gs; c++) {
                    const key = `h-${r}-${c}`;
                    if (!wallTypes[key] && horizontalWalls[r][c] === 'solid') wallTypes[key] = 'solid';
                    if (!wallTypes[key] && horizontalWalls[r][c] === 'open') wallTypes[key] = 'open';
                    if (!wallTypes[key] && horizontalWalls[r][c] === 'quantum') wallTypes[key] = 'quantum';
                }
            }
            for (let r = 0; r < gs; r++) {
                for (let c = 0; c < gs - 1; c++) {
                    const key = `v-${r}-${c}`;
                    if (!wallTypes[key] && verticalWalls[r][c] === 'solid') wallTypes[key] = 'solid';
                    if (!wallTypes[key] && verticalWalls[r][c] === 'open') wallTypes[key] = 'open';
                    if (!wallTypes[key] && verticalWalls[r][c] === 'quantum') wallTypes[key] = 'quantum';
                }
            }

            // Set start, key, exit positions
            GAME_STATE.startPosition = { row: 0, col: 0 };
            const exitR = gs - 1;
            const exitC = gs - 1;
            let keyR, keyC;
            do {
                keyR = Math.floor(Math.random() * gs);
                keyC = Math.floor(Math.random() * gs);
            } while ((keyR === 0 && keyC === 0) || (keyR === exitR && keyC === exitC) || (Math.abs(keyR - exitR) + Math.abs(
                keyC - exitC) < 2));

            GAME_STATE.exitPosition = { row: exitR, col: exitC };
            GAME_STATE.keyPosition = { row: keyR, col: keyC };
            GAME_STATE.playerHasKey = false;

            // Ensure path exists from start to key and key to exit
            ensurePathExists({ row: 0, col: 0 }, GAME_STATE.keyPosition);
            ensurePathExists(GAME_STATE.keyPosition, GAME_STATE.exitPosition);

            // Build 3D geometry
            buildMazeGeometry();

            // Place key and exit
            placeKey(keyR, keyC);
            placeExit(exitR, exitC);

            // Initialize observation timestamps
            const now = performance.now() / 1000;
            for (const key in wallTypes) {
                wallLastObserved[key] = now;
            }

            // Initialize light flicker
            cellLightFlicker = Array.from({ length: gs }, () =>
                Array.from({ length: gs }, () => ({
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.3 + Math.random() * 1.5,
                    intensity: 0.6 + Math.random() * 0.4,
                    nextFlicker: now + Math.random() * 5,
                }))
            );
        }

        function ensurePathExists(from, to) {
            const gs = GAME_STATE.gridSize;
            const visited = Array.from({ length: gs }, () => Array(gs).fill(false));
            const queue = [{ r: from.row, c: from.col }];
            visited[from.row][from.col] = true;
            const dirs = [
                { dr: -1, dc: 0, wType: 'h', wrOff: -1 },
                { dr: 1, dc: 0, wType: 'h', wrOff: 0 },
                { dr: 0, dc: -1, wType: 'v', wcOff: -1 },
                { dr: 0, dc: 1, wType: 'v', wcOff: 0 },
            ];

            while (queue.length > 0) {
                const { r, c } = queue.shift();
                if (r === to.row && c === to.col) return true;
                for (const d of dirs) {
                    const nr = r + d.dr;
                    const nc = c + d.dc;
                    if (nr < 0 || nr >= gs || nc < 0 || nc >= gs || visited[nr][nc]) continue;
                    const wr = d.wType === 'h' ? (d.wrOff === -1 ? r - 1 : r) : r;
                    const wc = d.wType === 'v' ? (d.wcOff === -1 ? c - 1 : c) : c;
                    const key = `${d.wType}-${wr}-${wc}`;
                    const wtype = wallTypes[key] || 'solid';
                    if (wtype === 'open' || wtype === 'quantum') {
                        visited[nr][nc] = true;
                        queue.push({ r: nr, c: nc });
                    }
                }
            }
            // If no path, force open some walls
            carvePath(from, to);
            return true;
        }

        function carvePath(from, to) {
            const gs = GAME_STATE.gridSize;
            let cr = from.row,
                cc = from.col;
            while (cr !== to.row || cc !== to.col) {
                const dr = Math.sign(to.row - cr);
                const dc = Math.sign(to.col - cc);
                if (dr !== 0 && (Math.random() < 0.5 || dc === 0)) {
                    const wr = dr === -1 ? cr - 1 : cr;
                    const wc = cc;
                    const key = `h-${wr}-${wc}`;
                    if (wr >= 0 && wr < gs - 1 && wc >= 0 && wc < gs) {
                        wallTypes[key] = 'open';
                        if (horizontalWalls[wr]) horizontalWalls[wr][wc] = 'open';
                    }
                    cr += dr;
                } else if (dc !== 0) {
                    const wr = cr;
                    const wc = dc === -1 ? cc - 1 : cc;
                    const key = `v-${wr}-${wc}`;
                    if (wr >= 0 && wr < gs && wc >= 0 && wc < gs - 1) {
                        wallTypes[key] = 'open';
                        if (verticalWalls[wr]) verticalWalls[wr][wc] = 'open';
                    }
                    cc += dc;
                }
            }
        }

        function buildMazeGeometry() {
            const gs = GAME_STATE.gridSize;
            const rs = GAME_STATE.roomSize;
            const wh = GAME_STATE.wallHeight;
            const wt = 0.2;

            // Floor
            const floorGeo = new THREE.PlaneGeometry(gs * rs + 1, gs * rs + 1);
            const floorMesh = new THREE.Mesh(floorGeo, floorMaterial);
            floorMesh.rotation.x = -Math.PI / 2;
            floorMesh.position.set((gs * rs) / 2, -0.05, (gs * rs) / 2);
            floorMesh.receiveShadow = true;
            floorGroup.add(floorMesh);

            // Ceiling
            const ceilGeo = new THREE.PlaneGeometry(gs * rs + 1, gs * rs + 1);
            const ceilMesh = new THREE.Mesh(ceilGeo, ceilingMaterial);
            ceilMesh.rotation.x = Math.PI / 2;
            ceilMesh.position.set((gs * rs) / 2, wh + 0.05, (gs * rs) / 2);
            ceilMesh.receiveShadow = true;
            ceilingGroup.add(ceilMesh);

            // Build walls
            const totalW = gs * rs;
            const totalD = gs * rs;

            // Outer boundary walls
            const outerWallGeoH = new THREE.BoxGeometry(totalW + 2, wh, wt);
            const outerWallGeoV = new THREE.BoxGeometry(wt, wh, totalD + 2);

            const outerWalls = [
                { geo: outerWallGeoH, pos: [totalW / 2, wh / 2, -wt / 2], rot: [0, 0, 0] },
                { geo: outerWallGeoH, pos: [totalW / 2, wh / 2, totalD + wt / 2], rot: [0, 0, 0] },
                { geo: outerWallGeoV, pos: [-wt / 2, wh / 2, totalD / 2], rot: [0, 0, 0] },
                { geo: outerWallGeoV, pos: [totalW + wt / 2, wh / 2, totalD / 2], rot: [0, 0, 0] },
            ];
            outerWalls.forEach(ow => {
                const mesh = new THREE.Mesh(ow.geo, wallMaterial);
                mesh.position.set(...ow.pos);
                mesh.rotation.set(...(ow.rot || [0, 0, 0]));
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.userData.isOuter = true;
                wallsGroup.add(mesh);
            });

            // Interior walls
            for (let r = 0; r < gs - 1; r++) {
                for (let c = 0; c < gs; c++) {
                    const key = `h-${r}-${c}`;
                    const wtype = wallTypes[key] || 'solid';
                    if (wtype === 'solid' || wtype === 'quantum') {
                        const wx = c * rs + rs / 2;
                        const wz = (r + 1) * rs;
                        const wallGeo = new THREE.BoxGeometry(rs + wt, wh, wt);
                        const mesh = new THREE.Mesh(wallGeo, wtype === 'quantum' ? wallMaterialAlt : wallMaterial);
                        mesh.position.set(wx, wh / 2, wz);
                        mesh.castShadow = true;
                        mesh.receiveShadow = true;
                        mesh.userData.wallKey = key;
                        mesh.userData.wallType = wtype;
                        mesh.userData.isHorizontal = true;
                        mesh.userData.gridR = r;
                        mesh.userData.gridC = c;
                        wallMeshes[key] = mesh;
                        wallsGroup.add(mesh);
                    }
                }
            }
            for (let r = 0; r < gs; r++) {
                for (let c = 0; c < gs - 1; c++) {
                    const key = `v-${r}-${c}`;
                    const wtype = wallTypes[key] || 'solid';
                    if (wtype === 'solid' || wtype === 'quantum') {
                        const wx = (c + 1) * rs;
                        const wz = r * rs + rs / 2;
                        const wallGeo = new THREE.BoxGeometry(wt, wh, rs + wt);
                        const mesh = new THREE.Mesh(wallGeo, wtype === 'quantum' ? wallMaterialAlt : wallMaterial);
                        mesh.position.set(wx, wh / 2, wz);
                        mesh.castShadow = true;
                        mesh.receiveShadow = true;
                        mesh.userData.wallKey = key;
                        mesh.userData.wallType = wtype;
                        mesh.userData.isHorizontal = false;
                        mesh.userData.gridR = r;
                        mesh.userData.gridC = c;
                        wallMeshes[key] = mesh;
                        wallsGroup.add(mesh);
                    }
                }
            }

            // Ceiling lights
            for (let r = 0; r < gs; r++) {
                cellLightMeshes[r] = [];
                for (let c = 0; c < gs; c++) {
                    const lx = c * rs + rs / 2;
                    const lz = r * rs + rs / 2;
                    const lightGeo = new THREE.BoxGeometry(1.2, 0.08, 0.5);
                    const lightMat = new THREE.MeshStandardMaterial({
                        color: 0xfff8e8,
                        roughness: 0.2,
                        metalness: 0.1,
                        emissive: 0xfff8e8,
                        emissiveIntensity: 1.0,
                    });
                    const lightMesh = new THREE.Mesh(lightGeo, lightMat);
                    lightMesh.position.set(lx, wh - 0.05, lz);
                    lightMesh.castShadow = false;
                    lightMesh.userData.gridR = r;
                    lightMesh.userData.gridC = c;
                    cellLightMeshes[r][c] = lightMesh;
                    lightsGroup.add(lightMesh);

                    // Point light for this fixture
                    const ptLight = new THREE.PointLight(0xffeedd, 1.8, 8, 2);
                    ptLight.position.set(lx, wh - 0.2, lz);
                    ptLight.castShadow = false;
                    ptLight.userData.gridR = r;
                    ptLight.userData.gridC = c;
                    ptLight.userData.baseIntensity = 1.8;
                    lightsGroup.add(ptLight);
                    if (!cellLightMeshes[r][c].userData) cellLightMeshes[r][c].userData = {};
                    cellLightMeshes[r][c].userData.pointLight = ptLight;
                }
            }
        }

        function updateWallMesh(key) {
            const mesh = wallMeshes[key];
            const wtype = wallTypes[key];
            if (!mesh && (wtype === 'solid' || wtype === 'quantum')) {
                // Need to create mesh
                const parts = key.split('-');
                const type = parts[0];
                const r = parseInt(parts[1]);
                const c = parseInt(parts[2]);
                const rs = GAME_STATE.roomSize;
                const wh = GAME_STATE.wallHeight;
                const wt = 0.2;
                let wallGeo, wx, wz;
                if (type === 'h') {
                    wallGeo = new THREE.BoxGeometry(rs + wt, wh, wt);
                    wx = c * rs + rs / 2;
                    wz = (r + 1) * rs;
                } else {
                    wallGeo = new THREE.BoxGeometry(wt, wh, rs + wt);
                    wx = (c + 1) * rs;
                    wz = r * rs + rs / 2;
                }
                const newMesh = new THREE.Mesh(wallGeo, wtype === 'quantum' ? wallMaterialAlt : wallMaterial);
                newMesh.position.set(wx, wh / 2, wz);
                newMesh.castShadow = true;
                newMesh.receiveShadow = true;
                newMesh.userData.wallKey = key;
                newMesh.userData.wallType = wtype;
                newMesh.userData.isHorizontal = type === 'h';
                newMesh.userData.gridR = r;
                newMesh.userData.gridC = c;
                wallMeshes[key] = newMesh;
                wallsGroup.add(newMesh);
            } else if (mesh && wtype === 'open') {
                // Remove mesh
                wallsGroup.remove(mesh);
                if (mesh.geometry) mesh.geometry.dispose();
                if (mesh.material) mesh.material.dispose();
                delete wallMeshes[key];
            } else if (mesh && (wtype === 'solid' || wtype === 'quantum')) {
                // Update material
                mesh.material = wtype === 'quantum' ? wallMaterialAlt : wallMaterial;
                mesh.userData.wallType = wtype;
                mesh.visible = true;
            }
        }

        function rebuildAllWalls() {
            for (const key in wallTypes) {
                updateWallMesh(key);
            }
        }

        // ─────────────────────────────────────
        // OBSERVATION SYSTEM
        // ─────────────────────────────────────
        function getPlayerGridPos() {
            const rs = GAME_STATE.roomSize;
            const col = Math.round(playerPosition.x / rs - 0.5);
            const row = Math.round(playerPosition.z / rs - 0.5);
            return {
                row: Math.max(0, Math.min(GAME_STATE.gridSize - 1, row)),
                col: Math.max(0, Math.min(GAME_STATE.gridSize - 1, col)),
            };
        }

        function isWallObserved(wallKey) {
            const parts = wallKey.split('-');
            const type = parts[0];
            const wr = parseInt(parts[1]);
            const wc = parseInt(parts[2]);
            const rs = GAME_STATE.roomSize;
            const gs = GAME_STATE.gridSize;

            let wallCenterX, wallCenterZ;
            if (type === 'h') {
                wallCenterX = wc * rs + rs / 2;
                wallCenterZ = (wr + 1) * rs;
            } else {
                wallCenterX = (wc + 1) * rs;
                wallCenterZ = wr * rs + rs / 2;
            }

            const dx = wallCenterX - playerPosition.x;
            const dz = wallCenterZ - playerPosition.z;
            const dist = Math.sqrt(dx * dx + dz * dz);

            if (dist > 18) return false;

            const forward = new THREE.Vector3(0, 0, -1);
            forward.applyQuaternion(camera.quaternion);
            const toWall = new THREE.Vector3(dx, 0, dz).normalize();
            const dot = forward.dot(toWall);

            // Wall is observed if it's roughly in front of the player
            if (dot > 0.15 && dist < 14) return true;
            if (dot > -0.1 && dist < 6) return true;

            return false;
        }

        function updateObservation() {
            const now = performance.now() / 1000;
            for (const key in wallTypes) {
                if (isWallObserved(key)) {
                    wallLastObserved[key] = now;
                }
            }
        }

        // ─────────────────────────────────────
        // QUANTUM EVENTS
        // ─────────────────────────────────────
        function triggerQuantumFluctuation() {
            const now = performance.now() / 1000;
            const chaosLevel = GAME_STATE.currentLevel * 0.18;
            const candidates = [];

            for (const key in wallTypes) {
                if (wallTypes[key] !== 'quantum') continue;
                const lastSeen = wallLastObserved[key] || now;
                const unseenDuration = now - lastSeen;
                if (unseenDuration > 1.8 && !isWallObserved(key)) {
                    const probability = Math.min(0.7, (unseenDuration - 1.8) * 0.12 * (1 + chaosLevel));
                    if (Math.random() < probability) {
                        candidates.push(key);
                    }
                }
            }

            if (candidates.length > 0) {
                const numChanges = Math.min(candidates.length, 1 + Math.floor(Math.random() * 3 * (1 + chaosLevel)));
                const shuffled = candidates.sort(() => Math.random() - 0.5);
                for (let i = 0; i < numChanges; i++) {
                    const key = shuffled[i];
                    const currentState = wallTypes[key];
                    const newState = currentState === 'quantum' ?
                        (Math.random() < 0.5 ? 'solid' : 'open') :
                        (currentState === 'solid' ? 'open' : 'solid');
                    wallTypes[key] = newState;
                    const parts = key.split('-');
                    if (parts[0] === 'h') {
                        horizontalWalls[parseInt(parts[1])][parseInt(parts[2])] = newState;
                    } else {
                        verticalWalls[parseInt(parts[1])][parseInt(parts[2])] = newState;
                    }
                    updateWallMesh(key);
                    wallLastObserved[key] = now;
                }
                if (numChanges > 0 && Math.random() < 0.4) {
                    playDistantDoor();
                }
                GAME_STATE.quantumInstability = Math.min(1, GAME_STATE.quantumInstability + 0.15);
            }
        }

        function checkQuantumTunneling() {
            const now = performance.now() / 1000;
            if (now - GAME_STATE.lastTunnelTime < GAME_STATE.tunnelCooldown) return false;
            const chaosLevel = GAME_STATE.currentLevel * 0.06;
            const baseChance = 0.003 + chaosLevel;
            if (Math.random() < baseChance * (1 + GAME_STATE.quantumInstability)) {
                GAME_STATE.lastTunnelTime = now;
                GAME_STATE.quantumInstability = Math.max(0, GAME_STATE.quantumInstability - 0.4);
                return true;
            }
            return false;
        }

        function attemptQuantumTunnel() {
            const rs = GAME_STATE.roomSize;
            const gs = GAME_STATE.gridSize;
            const playerGrid = getPlayerGridPos();
            const px = playerPosition.x;
            const pz = playerPosition.z;

            // Find nearest solid wall
            const candidates = [];
            for (const key in wallTypes) {
                const wtype = wallTypes[key];
                if (wtype !== 'solid' && wtype !== 'quantum') continue;
                const parts = key.split('-');
                const type = parts[0];
                const wr = parseInt(parts[1]);
                const wc = parseInt(parts[2]);
                let wx, wz;
                if (type === 'h') {
                    wx = wc * rs + rs / 2;
                    wz = (wr + 1) * rs;
                } else {
                    wx = (wc + 1) * rs;
                    wz = wr * rs + rs / 2;
                }
                const dist = Math.sqrt((px - wx) ** 2 + (pz - wz) ** 2);
                if (dist < 1.8) {
                    candidates.push({ key, type, wr, wc, wx, wz, dist });
                }
            }

            if (candidates.length === 0) return false;
            candidates.sort((a, b) => a.dist - b.dist);
            const target = candidates[0];

            // Teleport player to other side
            const offset = 2.5;
            if (target.type === 'h') {
                const playerSide = pz < target.wz ? -1 : 1;
                playerPosition.z = target.wz + playerSide * offset;
            } else {
                const playerSide = px < target.wx ? -1 : 1;
                playerPosition.x = target.wx + playerSide * offset;
            }
            playerPosition.x = Math.max(0.5, Math.min(gs * rs - 0.5, playerPosition.x));
            playerPosition.z = Math.max(0.5, Math.min(gs * rs - 0.5, playerPosition.z));

            // Visual effect
            GAME_STATE.screenShakeAmount = 0.6;
            playThud(0.2, 40);
            addTunnelParticles(playerPosition.x, playerPosition.y, playerPosition.z);

            return true;
        }

        function addTunnelParticles(x, y, z) {
            const particleGroup = new THREE.Group();
            const particleMat = new THREE.MeshBasicMaterial({ color: 0xaaccff, transparent: true, opacity: 0.7 });
            for (let i = 0; i < 20; i++) {
                const geo = new THREE.SphereGeometry(0.04, 4, 4);
                const particle = new THREE.Mesh(geo, particleMat);
                particle.position.set(
                    x + (Math.random() - 0.5) * 3,
                    y + Math.random() * 2,
                    z + (Math.random() - 0.5) * 3
                );
                particle.userData.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 2,
                    Math.random() * 2,
                    (Math.random() - 0.5) * 2
                );
                particle.userData.life = 0.6 + Math.random() * 0.5;
                particleGroup.add(particle);
            }
            particleGroup.userData.spawnTime = performance.now() / 1000;
            particleGroup.userData.lifetime = 1.2;
            scene.add(particleGroup);
            // Cleanup will be in game loop
            if (!GAME_STATE._tempParticles) GAME_STATE._tempParticles = [];
            GAME_STATE._tempParticles.push(particleGroup);
        }

        // ─────────────────────────────────────
        // ENTANGLED DOORS
        // ─────────────────────────────────────
        let entangledPairs = [];

        function setupEntangledDoors() {
            entangledPairs = [];
            const quantumWalls = [];
            for (const key in wallTypes) {
                if (wallTypes[key] === 'quantum') quantumWalls.push(key);
            }
            const numPairs = Math.min(3 + GAME_STATE.currentLevel, Math.floor(quantumWalls.length / 2));
            const shuffled = [...quantumWalls].sort(() => Math.random() - 0.5);
            for (let i = 0; i < numPairs * 2; i += 2) {
                if (i + 1 < shuffled.length) {
                    entangledPairs.push([shuffled[i], shuffled[i + 1]]);
                }
            }
        }

        function triggerEntangledPartner(changedKey) {
            for (const pair of entangledPairs) {
                if (pair[0] === changedKey || pair[1] === changedKey) {
                    const partner = pair[0] === changedKey ? pair[1] : pair[0];
                    if (wallTypes[partner] === 'quantum') {
                        const newState = Math.random() < 0.5 ? 'solid' : 'open';
                        wallTypes[partner] = newState;
                        const parts = partner.split('-');
                        if (parts[0] === 'h') {
                            horizontalWalls[parseInt(parts[1])][parseInt(parts[2])] = newState;
                        } else {
                            verticalWalls[parseInt(parts[1])][parseInt(parts[2])] = newState;
                        }
                        updateWallMesh(partner);
                        wallLastObserved[partner] = performance.now() / 1000;
                        playDistantDoor();
                    }
                }
            }
        }

        // ─────────────────────────────────────
        // COLLISION DETECTION
        // ─────────────────────────────────────
        function isPositionBlocked(x, z, radius = 0.45) {
            const rs = GAME_STATE.roomSize;
            const gs = GAME_STATE.gridSize;

            // Check outer bounds
            if (x - radius < 0 || x + radius > gs * rs || z - radius < 0 || z + radius > gs * rs) {
                return true;
            }

            // Check interior walls
            for (const key in wallTypes) {
                const wtype = wallTypes[key];
                if (wtype !== 'solid' && wtype !== 'quantum') continue;
                const parts = key.split('-');
                const type = parts[0];
                const wr = parseInt(parts[1]);
                const wc = parseInt(parts[2]);
                let wx, wz;
                const wt = 0.2;
                if (type === 'h') {
                    wx = wc * rs + rs / 2;
                    wz = (wr + 1) * rs;
                    const halfLen = rs / 2 + wt;
                    if (Math.abs(x - wx) < halfLen + radius && Math.abs(z - wz) < wt / 2 + radius) {
                        return true;
                    }
                } else {
                    wx = (wc + 1) * rs;
                    wz = wr * rs + rs / 2;
                    const halfLen = rs / 2 + wt;
                    if (Math.abs(x - wx) < wt / 2 + radius && Math.abs(z - wz) < halfLen + radius) {
                        return true;
                    }
                }
            }
            return false;
        }

        function resolveCollision(desiredX, desiredZ, radius = 0.45) {
            if (!isPositionBlocked(desiredX, desiredZ, radius)) {
                return { x: desiredX, z: desiredZ, blocked: false };
            }
            // Try sliding along X
            if (!isPositionBlocked(desiredX, playerPosition.z, radius)) {
                return { x: desiredX, z: playerPosition.z, blocked: true };
            }
            // Try sliding along Z
            if (!isPositionBlocked(playerPosition.x, desiredZ, radius)) {
                return { x: playerPosition.x, z: desiredZ, blocked: true };
            }
            return { x: playerPosition.x, z: playerPosition.z, blocked: true };
        }

        // ─────────────────────────────────────
        // INPUT HANDLING
        // ─────────────────────────────────────
        document.addEventListener('keydown', (e) => {
            keysPressed[e.code] = true;
            if (e.code === 'KeyF' && GAME_STATE.gameActive) {
                tryInteract();
            }
        });
        document.addEventListener('keyup', (e) => { keysPressed[e.code] = false; });

        document.addEventListener('mousemove', (e) => {
            if (!pointerLocked || !GAME_STATE.gameActive) return;
            const sensitivity = 0.002;
            playerEuler.y -= e.movementX * sensitivity;
            playerEuler.x -= e.movementY * sensitivity;
            playerEuler.x = Math.max(-Math.PI / 2.3, Math.min(Math.PI / 2.3, playerEuler.x));
        });

        document.addEventListener('click', () => {
            if (GAME_STATE.gameActive && !pointerLocked) {
                renderer.domElement.requestPointerLock();
            }
        });

        document.addEventListener('pointerlockchange', () => {
            pointerLocked = document.pointerLockElement === renderer.domElement;
            if (!pointerLocked && GAME_STATE.gameActive) {
                hintEl.style.opacity = '1';
                hintEl.textContent = 'CLICK TO FOCUS';
                setTimeout(() => { hintEl.style.opacity = '0'; }, 2500);
            }
        });

        function tryInteract() {
            if (!GAME_STATE.gameActive || GAME_STATE.levelComplete) return;
            const playerGrid = getPlayerGridPos();
            const rs = GAME_STATE.roomSize;
            const px = playerPosition.x;
            const pz = playerPosition.z;

            // Check key pickup
            if (keyMesh && !GAME_STATE.playerHasKey) {
                const kx = keyMesh.position.x;
                const kz = keyMesh.position.z;
                const dist = Math.sqrt((px - kx) ** 2 + (pz - kz) ** 2);
                if (dist < 2.0) {
                    GAME_STATE.playerHasKey = true;
                    keyGroup.remove(keyMesh);
                    if (keyMesh.userData?.glowLight) keyMesh.userData.glowLight.dispose();
                    keyMesh.traverse(c => { if (c.material && c.material.dispose && c.material !== keyMesh.userData
                            ?.glowLight?.material) c.material.dispose(); });
                    keyMesh = null;
                    GAME_STATE.keyPosition = null;
                    playThud(0.4, 200);
                    hintEl.style.opacity = '1';
                    hintEl.textContent = 'KEY ACQUIRED - FIND THE EXIT';
                    setTimeout(() => { hintEl.style.opacity = '0'; }, 3000);
                    return;
                }
            }

            // Check exit
            if (GAME_STATE.playerHasKey && exitMarkerMesh) {
                const ex = exitMarkerMesh.position.x;
                const ez = exitMarkerMesh.position.z;
                const dist = Math.sqrt((px - ex) ** 2 + (pz - ez) ** 2);
                if (dist < 2.2) {
                    completeLevel();
                    return;
                }
            }

            // Check door interaction (toggle nearby quantum walls)
            for (const key in wallTypes) {
                if (wallTypes[key] !== 'quantum') continue;
                const parts = key.split('-');
                const type = parts[0];
                const wr = parseInt(parts[1]);
                const wc = parseInt(parts[2]);
                let wx, wz;
                if (type === 'h') {
                    wx = wc * rs + rs / 2;
                    wz = (wr + 1) * rs;
                } else {
                    wx = (wc + 1) * rs;
                    wz = wr * rs + rs / 2;
                }
                const dist = Math.sqrt((px - wx) ** 2 + (pz - wz) ** 2);
                if (dist < 2.5) {
                    const newState = wallTypes[key] === 'solid' ? 'open' : 'solid';
                    wallTypes[key] = newState;
                    if (type === 'h') horizontalWalls[wr][wc] = newState;
                    else verticalWalls[wr][wc] = newState;
                    updateWallMesh(key);
                    wallLastObserved[key] = performance.now() / 1000;
                    triggerEntangledPartner(key);
                    playThud(0.15, 80);
                    return;
                }
            }
        }

        function completeLevel() {
            GAME_STATE.levelComplete = true;
            GAME_STATE.gameActive = false;
            hintEl.style.opacity = '1';
            if (GAME_STATE.currentLevel >= GAME_STATE.maxLevel) {
                hintEl.textContent = 'YOU ESCAPED THE QUANTUM MAZE';
                setTimeout(() => {
                    hintEl.style.opacity = '0';
                    resetGame();
                }, 4000);
            } else {
                hintEl.textContent = `LEVEL ${GAME_STATE.currentLevel} COMPLETE - PREPARE FOR LEVEL ${GAME_STATE.currentLevel + 1}`;
                setTimeout(() => {
                    GAME_STATE.currentLevel++;
                    startLevel();
                }, 3500);
            }
        }

        function resetGame() {
            GAME_STATE.currentLevel = 1;
            GAME_STATE.gridSize = 6;
            GAME_STATE.playerHasKey = false;
            GAME_STATE.levelComplete = false;
            GAME_STATE.quantumInstability = 0;
            GAME_STATE.totalChaos = 0;
            GAME_STATE.jumpscareCooldown = 0;
            GAME_STATE.screenShakeAmount = 0;
            GAME_STATE.lastTunnelTime = 0;
            GAME_STATE.heartbeating = false;
            GAME_STATE.heartbeatTimer = 0;
            clearMaze();
            entities.forEach(e => entityGroup.remove(e));
            entities.length = 0;
            if (GAME_STATE._tempParticles) {
                GAME_STATE._tempParticles.forEach(p => scene.remove(p));
                GAME_STATE._tempParticles = [];
            }
            generateMaze(GAME_STATE.currentLevel);
            setupEntangledDoors();
            resetPlayer();
            GAME_STATE.gameActive = true;
            GAME_STATE.levelComplete = false;
            hintEl.style.opacity = '0';
        }

        function startLevel() {
            const level = GAME_STATE.currentLevel;
            GAME_STATE.gridSize = 6 + Math.floor((level - 1) * 1.2);
            GAME_STATE.playerHasKey = false;
            GAME_STATE.levelComplete = false;
            GAME_STATE.quantumInstability = level * 0.08;
            GAME_STATE.totalChaos = level * 0.1;
            GAME_STATE.jumpscareCooldown = 0;
            GAME_STATE.screenShakeAmount = 0;
            GAME_STATE.lastTunnelTime = 0;
            GAME_STATE.heartbeating = false;
            GAME_STATE.heartbeatTimer = 0;
            clearMaze();
            entities.forEach(e => entityGroup.remove(e));
            entities.length = 0;
            if (GAME_STATE._tempParticles) {
                GAME_STATE._tempParticles.forEach(p => scene.remove(p));
                GAME_STATE._tempParticles = [];
            }
            generateMaze(level);
            setupEntangledDoors();
            resetPlayer();
            GAME_STATE.gameActive = true;
            GAME_STATE.levelComplete = false;
            hintEl.style.opacity = '1';
            hintEl.textContent = `LEVEL ${level} - FIND THE KEY`;
            setTimeout(() => { hintEl.style.opacity = '0'; }, 3000);
            if (pointerLocked) {
                document.exitPointerLock();
            }
        }

        // ─────────────────────────────────────
        // ENTITY AI
        // ─────────────────────────────────────
        function updateEntities(deltaTime) {
            const now = performance.now() / 1000;
            const chaosLevel = GAME_STATE.currentLevel * 0.12;

            // Spawn entities occasionally
            if (entities.length < 2 + GAME_STATE.currentLevel && Math.random() < 0.008 * (1 + chaosLevel) && GAME_STATE
                .jumpscareCooldown <= 0) {
                const gs = GAME_STATE.gridSize;
                const playerGrid = getPlayerGridPos();
                let sr, sc;
                let attempts = 0;
                do {
                    sr = Math.floor(Math.random() * gs);
                    sc = Math.floor(Math.random() * gs);
                    attempts++;
                } while (
                    (Math.abs(sr - playerGrid.row) + Math.abs(sc - playerGrid.col) < 3) &&
                    attempts < 30
                );
                if (attempts < 30) {
                    const ent = spawnEntity(sr, sc);
                    ent.userData.state = 'idle';
                }
            }

            // Update existing entities
            for (const entity of entities) {
                if (entity.userData.vanished) continue;
                const ex = entity.position.x;
                const ez = entity.position.z;
                const dx = playerPosition.x - ex;
                const dz = playerPosition.z - ez;
                const distToPlayer = Math.sqrt(dx * dx + dz * dz);

                // Check if player is looking at entity
                const forward = new THREE.Vector3(0, 0, -1);
                forward.applyQuaternion(camera.quaternion);
                const toEntity = new THREE.Vector3(dx, 0, dz).normalize();
                const dotToEntity = forward.dot(toEntity);
                const playerLookingAtEntity = dotToEntity > 0.7 && distToPlayer < 12;

                // Update state
                const state = entity.userData.state;

                if (state === 'idle') {
                    if (distToPlayer < 5 && !playerLookingAtEntity && Math.random() < 0.02) {
                        entity.userData.state = 'stalking';
                    } else if (playerLookingAtEntity && distToPlayer < 10 && Math.random() < 0.03) {
                        entity.userData.state = 'vanishing';
                        entity.userData.vanished = true;
                        entity.userData.vanishStart = now;
                    }
                } else if (state === 'stalking') {
                    if (distToPlayer < 2.5 && GAME_STATE.jumpscareCooldown <= 0) {
                        entity.userData.state = 'charging';
                        entity.userData.chargeTarget = playerPosition.clone();
                        triggerJumpscare(entity);
                    } else if (playerLookingAtEntity && Math.random() < 0.06) {
                        entity.userData.state = 'vanishing';
                        entity.userData.vanished = true;
                        entity.userData.vanishStart = now;
                    } else {
                        // Move toward player slowly
                        const speed = 0.8 + chaosLevel;
                        const moveX = (dx / distToPlayer) * speed * deltaTime;
                        const moveZ = (dz / distToPlayer) * speed * deltaTime;
                        entity.position.x += moveX;
                        entity.position.z += moveZ;
                        entity.position.y = 0;
                        entity.lookAt(playerPosition.x, entity.position.y, playerPosition.z);
                    }
                }

                // Animate entity
                const animPhase = entity.userData.animationPhase + now * entity.userData.animationSpeed;
                if (entity.userData.bodyMesh) {
                    entity.userData.bodyMesh.position.y = 1.1 + Math.sin(animPhase) * 0.08;
                }
                if (entity.userData.headMesh) {
                    entity.userData.headMesh.position.y = 2.0 + Math.sin(animPhase * 1.3) * 0.05;
                }

                // Fade out vanishing entities
                if (entity.userData.vanished) {
                    const elapsed = now - entity.userData.vanishStart;
                    const opacity = Math.max(0, 0.85 - elapsed * 1.7);
                    entity.traverse(child => {
                        if (child.material && child.material.transparent) {
                            child.material.opacity = opacity;
                        }
                    });
                }
            }

            // Heartbeat near entities
            const nearbyEntity = entities.find(e => {
                if (e.userData.vanished) return false;
                const dx = playerPosition.x - e.position.x;
                const dz = playerPosition.z - e.position.z;
                return Math.sqrt(dx * dx + dz * dz) < 7;
            });

            if (nearbyEntity && !GAME_STATE.heartbeating) {
                GAME_STATE.heartbeating = true;
                GAME_STATE.heartbeatTimer = 0;
            } else if (!nearbyEntity && GAME_STATE.heartbeating) {
                GAME_STATE.heartbeating = false;
                GAME_STATE.heartbeatTimer = 0;
            }

            if (GAME_STATE.heartbeating) {
                GAME_STATE.heartbeatTimer += deltaTime;
                if (GAME_STATE.heartbeatTimer > 1.5) {
                    GAME_STATE.heartbeatTimer = 0;
                    playHeartbeat();
                }
            }
        }

        function triggerJumpscare(entity) {
            GAME_STATE.jumpscareCooldown = 4;
            GAME_STATE.screenShakeAmount = 1.5;
            playJumpscareSound();

            // Flash
            jumpscareFlash.style.opacity = '0.9';
            setTimeout(() => { jumpscareFlash.style.opacity = '0'; }, 120);

            // Teleport player randomly
            const gs = GAME_STATE.gridSize;
            const rs = GAME_STATE.roomSize;
            const newR = Math.floor(Math.random() * gs);
            const newC = Math.floor(Math.random() * gs);
            playerPosition.x = newC * rs + rs / 2;
            playerPosition.z = newR * rs + rs / 2;
            playerPosition.y = 1.6;

            // Despawn entity
            despawnEntity(entity);

            // Increase chaos
            GAME_STATE.quantumInstability = Math.min(1, GAME_STATE.quantumInstability + 0.35);
            GAME_STATE.totalChaos += 0.2;
        }

        // ─────────────────────────────────────
        // GAME LOOP
        // ─────────────────────────────────────
        const clock = new THREE.Clock();
        let quantumEventTimer = 0;
        let flickerUpdateTimer = 0;

        function update(deltaTime) {
            if (!GAME_STATE.gameActive || GAME_STATE.levelComplete) {
                // Still update camera rotation
                camera.rotation.order = 'YXZ';
                camera.rotation.y = playerEuler.y;
                camera.rotation.x = playerEuler.x;
                return;
            }

            deltaTime = Math.min(deltaTime, 0.2);

            // Update jumpscare cooldown
            if (GAME_STATE.jumpscareCooldown > 0) {
                GAME_STATE.jumpscareCooldown -= deltaTime;
            }

            // Screen shake decay
            if (GAME_STATE.screenShakeAmount > 0.001) {
                GAME_STATE.screenShakeAmount *= Math.exp(-deltaTime * 4);
            } else {
                GAME_STATE.screenShakeAmount = 0;
            }

            // Player movement
            const forward = new THREE.Vector3(0, 0, -1);
            forward.applyAxisAngle(new THREE.Vector3(0, 1, 0), playerEuler.y);
            const right = new THREE.Vector3(1, 0, 0);
            right.applyAxisAngle(new THREE.Vector3(0, 1, 0), playerEuler.y);

            const moveSpeed = 5.5;
            let moveX = 0;
            let moveZ = 0;

            if (keysPressed['KeyW'] || keysPressed['ArrowUp']) { moveX += forward.x;
                moveZ += forward.z; }
            if (keysPressed['KeyS'] || keysPressed['ArrowDown']) { moveX -= forward.x;
                moveZ -= forward.z; }
            if (keysPressed['KeyA'] || keysPressed['ArrowLeft']) { moveX -= right.x;
                moveZ -= right.z; }
            if (keysPressed['KeyD'] || keysPressed['ArrowRight']) { moveX += right.x;
                moveZ += right.z; }

            if (moveX !== 0 || moveZ !== 0) {
                const len = Math.sqrt(moveX * moveX + moveZ * moveZ);
                moveX /= len;
                moveZ /= len;
                const desiredX = playerPosition.x + moveX * moveSpeed * deltaTime;
                const desiredZ = playerPosition.z + moveZ * moveSpeed * deltaTime;
                const resolved = resolveCollision(desiredX, desiredZ, 0.45);

                if (resolved.blocked && checkQuantumTunneling()) {
                    if (attemptQuantumTunnel()) {
                        // Tunneling succeeded
                    } else {
                        playerPosition.x = resolved.x;
                        playerPosition.z = resolved.z;
                    }
                } else {
                    playerPosition.x = resolved.x;
                    playerPosition.z = resolved.z;
                }
            }

            playerPosition.y = 1.6;

            // Update camera with screen shake
            const shakeX = GAME_STATE.screenShakeAmount * (Math.random() - 0.5) * 0.3;
            const shakeY = GAME_STATE.screenShakeAmount * (Math.random() - 0.5) * 0.25;
            const shakeZ = GAME_STATE.screenShakeAmount * (Math.random() - 0.5) * 0.3;

            camera.position.set(
                playerPosition.x + shakeX,
                playerPosition.y + shakeY,
                playerPosition.z + shakeZ
            );
            camera.rotation.order = 'YXZ';
            camera.rotation.y = playerEuler.y;
            camera.rotation.x = playerEuler.x;

            // Update observation
            updateObservation();

            // Quantum events
            quantumEventTimer += deltaTime;
            if (quantumEventTimer > 1.2 + Math.random() * 0.8) {
                quantumEventTimer = 0;
                triggerQuantumFluctuation();
            }

            // Update entities
            updateEntities(deltaTime);
            cleanupEntities();

            // Update flickering lights
            flickerUpdateTimer += deltaTime;
            if (flickerUpdateTimer > 0.3) {
                flickerUpdateTimer = 0;
                const now = performance.now() / 1000;
                for (let r = 0; r < GAME_STATE.gridSize; r++) {
                    for (let c = 0; c < GAME_STATE.gridSize; c++) {
                        if (cellLightFlicker[r] && cellLightFlicker[r][c]) {
                            const flicker = cellLightFlicker[r][c];
                            if (now > flicker.nextFlicker) {
                                flicker.intensity = 0.25 + Math.random() * 0.75;
                                flicker.nextFlicker = now + 0.5 + Math.random() * 4;
                                flicker.speed = 0.3 + Math.random() * 2;
                            }
                            const lightLevel = flicker.intensity + Math.sin(now * flicker.speed + flicker.phase) * 0.2;
                            const clampedLevel = Math.max(0.3, Math.min(1.5, lightLevel));
                            if (cellLightMeshes[r] && cellLightMeshes[r][c] && cellLightMeshes[r][c].userData
                                .pointLight) {
                                cellLightMeshes[r][c].userData.pointLight.intensity =
                                    cellLightMeshes[r][c].userData.pointLight.userData.baseIntensity *
                                    clampedLevel;
                            }
                            if (cellLightMeshes[r] && cellLightMeshes[r][c] && cellLightMeshes[r][c].material) {
                                cellLightMeshes[r][c].material.emissiveIntensity = clampedLevel;
                            }
                        }
                    }
                }
            }

            // Animate key
            if (keyMesh && keyMesh.userData) {
                keyMesh.position.y = keyMesh.userData.baseY + Math.sin(performance.now() / 1000 * 2) * 0.25;
                keyMesh.rotation.y += deltaTime * 1.5;
            }

            // Animate exit marker
            if (exitMarkerMesh && exitMarkerMesh.userData) {
                exitMarkerMesh.rotation.y += deltaTime * 0.6;
                const glow = exitMarkerMesh.userData.glowLight;
                if (glow) {
                    glow.intensity = 2 + Math.sin(performance.now() / 1000 * 3) * 0.8;
                }
            }

            // Cleanup temp particles
            if (GAME_STATE._tempParticles && GAME_STATE._tempParticles.length > 0) {
                const now2 = performance.now() / 1000;
                for (let i = GAME_STATE._tempParticles.length - 1; i >= 0; i--) {
                    const pg = GAME_STATE._tempParticles[i];
                    const age = now2 - pg.userData.spawnTime;
                    if (age > pg.userData.lifetime) {
                        pg.children.forEach(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material
                                .dispose(); });
                        scene.remove(pg);
                        GAME_STATE._tempParticles.splice(i, 1);
                    } else {
                        pg.children.forEach(c => {
                            if (c.userData.velocity) {
                                c.position.x += c.userData.velocity.x * deltaTime;
                                c.position.y += c.userData.velocity.y * deltaTime;
                                c.position.z += c.userData.velocity.z * deltaTime;
                                c.userData.velocity.y += deltaTime * 0.5;
                            }
                            if (c.material && c.material.opacity !== undefined) {
                                c.material.opacity = Math.max(0, c.userData.life - age) / (c.userData
                                    .life || 1);
                            }
                        });
                    }
                }
            }

            // Update overlay effects based on quantum instability
            const instability = GAME_STATE.quantumInstability;
            overlayEl.style.background = `radial-gradient(ellipse at center, transparent ${55 - instability * 20}%, rgba(0,0,0,${0.55 + instability * 0.3}) 100%)`;
            vignetteEl.style.boxShadow = `inset 0 0 ${180 + instability * 80}px ${60 + instability * 50}px rgba(0,0,0,${0.7 + instability * 0.25})`;

            // Decay quantum instability
            GAME_STATE.quantumInstability = Math.max(0, GAME_STATE.quantumInstability - deltaTime * 0.04);

            // Update ambient hum based on chaos
            if (humGain && GAME_STATE.gameActive) {
                const chaosVal = GAME_STATE.totalChaos + GAME_STATE.quantumInstability;
                humGain.gain.value = 0.04 + chaosVal * 0.06;
                humFilter.frequency.value = 200 - chaosVal * 80;
            }
        }

        function render() {
            renderer.render(scene, camera);
        }

        function gameLoop() {
            requestAnimationFrame(gameLoop);
            const deltaTime = Math.min(clock.getDelta(), 0.25);
            update(deltaTime);
            render();
        }

        // ─────────────────────────────────────
        // INITIALIZATION
        // ─────────────────────────────────────
        function initGame() {
            GAME_STATE.currentLevel = 1;
            GAME_STATE.gridSize = 6;
            GAME_STATE.playerHasKey = false;
            GAME_STATE.levelComplete = false;
            GAME_STATE.gameActive = false;
            GAME_STATE.quantumInstability = 0;
            GAME_STATE.totalChaos = 0;
            GAME_STATE.jumpscareCooldown = 0;
            GAME_STATE.screenShakeAmount = 0;
            GAME_STATE.lastTunnelTime = 0;
            GAME_STATE.heartbeating = false;
            GAME_STATE.heartbeatTimer = 0;
            GAME_STATE._tempParticles = [];
            clearMaze();
            entities.length = 0;
            generateMaze(1);
            setupEntangledDoors();
            resetPlayer();
            camera.position.copy(playerPosition);
            camera.rotation.set(0, playerEuler.y, 0);
            hintEl.style.opacity = '0';
        }

        enterBtn.addEventListener('click', () => {
            startAudio();
            initGame();
            GAME_STATE.gameActive = true;
            splashEl.classList.add('hidden');
            hintEl.style.opacity = '1';
            hintEl.textContent = 'CLICK TO FOCUS - WASD TO MOVE - F TO INTERACT';
            setTimeout(() => {
                hintEl.style.opacity = '0';
                renderer.domElement.requestPointerLock();
            }, 3500);
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize and start
        initGame();
        gameLoop();

        // Show splash
        splashEl.classList.remove('hidden');
        hintEl.style.opacity = '0';

        console.log('🔮 Quantum Backrooms initialized');
        console.log('   - Observer Effect: Your surroundings change when unseen');
        console.log('   - Quantum Tunneling: Phase through walls randomly');
        console.log('   - Entangled Doors: Distant doors echo your actions');
        console.log('   - Shadow Entities: They watch from the dark');
        console.log('   - Find the key, reach the exit, survive the maze.');
        console.log('   Controls: WASD = Move | Mouse = Look | F = Interact | Click = Lock cursor');
    </script>
</body>
</html>
