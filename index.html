    <script type="module">
        import * as THREE from 'three';

        // ─────────────────────────────────────
        // DOM ELEMENTS
        // ─────────────────────────────────────
        const splashEl = document.getElementById('splash');
        const enterBtn = document.getElementById('enterBtn');
        const hintEl = document.getElementById('hint');
        const jumpscareFlash = document.getElementById('jumpscare-flash');
        const overlayEl = document.getElementById('overlay');
        const vignetteEl = document.getElementById('vignette');
        const chromaticEl = document.getElementById('chromatic');

        // ─────────────────────────────────────
        // THREE.JS SETUP
        // ─────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        scene.fog = new THREE.FogExp2(0x0a0a0a, 0.00025);

        const camera = new THREE.PerspectiveCamera(82, window.innerWidth / window.innerHeight, 0.15, 80);
        camera.position.set(2.5, 1.6, 2.5);
        camera.rotation.order = 'YXZ';

        // ─────────────────────────────────────
        // AUDIO SYSTEM
        // ─────────────────────────────────────
        const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
        let audioStarted = false;

        function startAudio() {
            if (!audioStarted) {
                audioCtx.resume();
                audioStarted = true;
                createAmbientHum();
            }
        }

        let humOsc, humGain, humFilter;
        let ambientNoiseNode;

        function createAmbientHum() {
            humFilter = audioCtx.createBiquadFilter();
            humFilter.type = 'lowpass';
            humFilter.frequency.value = 200;
            humFilter.Q.value = 1;

            humOsc = audioCtx.createOscillator();
            humOsc.type = 'sawtooth';
            humOsc.frequency.value = 55;

            const subOsc = audioCtx.createOscillator();
            subOsc.type = 'sine';
            subOsc.frequency.value = 28;

            humGain = audioCtx.createGain();
            humGain.gain.value = 0.04;

            const subGain = audioCtx.createGain();
            subGain.gain.value = 0.03;

            humOsc.connect(humFilter);
            humFilter.connect(humGain);
            humGain.connect(audioCtx.destination);

            subOsc.connect(subGain);
            subGain.connect(audioCtx.destination);

            humOsc.start();
            subOsc.start();

            const bufferSize = audioCtx.sampleRate * 2;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.02;
            }
            ambientNoiseNode = audioCtx.createBufferSource();
            ambientNoiseNode.buffer = noiseBuffer;
            ambientNoiseNode.loop = true;
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.value = 0.015;
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'bandpass';
            noiseFilter.frequency.value = 800;
            noiseFilter.Q.value = 0.5;
            ambientNoiseNode.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            ambientNoiseNode.start();
        }

        function playThud(volume = 0.3, freq = 60) {
            if (!audioStarted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function playJumpscareSound() {
            if (!audioStarted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.6);
            gain.gain.setValueAtTime(0.7, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.7);
            const distort = audioCtx.createWaveShaper();
            distort.curve = new Float32Array([-1, -0.8, -0.3, 0, 0.3, 0.8, 1]);
            osc.connect(distort);
            distort.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.7);
        }

        function playDistantDoor() {
            if (!audioStarted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 1.2);
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.3);
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 300;
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.3);
        }

        function playHeartbeat() {
            if (!audioStarted) return;
            const now = audioCtx.currentTime;
            for (let i = 0; i < 3; i++) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = 35;
                const t = now + i * 0.25;
                gain.gain.setValueAtTime(0.25, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(t);
                osc.stop(t + 0.2);
            }
        }

        // ─────────────────────────────────────
        // GAME STATE
        // ─────────────────────────────────────
        const GAME_STATE = {
            currentLevel: 1,
            maxLevel: 5,
            gridSize: 6,
            roomSize: 5.5,
            wallHeight: 3.2,
            playerHasKey: false,
            keyPosition: null,
            exitPosition: null,
            startPosition: null,
            gameActive: false,
            levelComplete: false,
            totalChaos: 0,
            quantumInstability: 0,
            jumpscareCooldown: 0,
            screenShakeAmount: 0,
            lastTunnelTime: 0,
            tunnelCooldown: 2.5,
            heartbeating: false,
            heartbeatTimer: 0,
        };

        // ─────────────────────────────────────
        // MAZE DATA
        // ─────────────────────────────────────
        let horizontalWalls = []; 
        let verticalWalls = []; 
        let wallTypes = {};
        let wallLastObserved = {}; 
        let wallMeshes = {}; 
        let cellLightFlicker = []; 
        let cellLightMeshes = []; 

        const mazeGroup = new THREE.Group();
        const wallsGroup = new THREE.Group();
        const lightsGroup = new THREE.Group();
        const floorGroup = new THREE.Group();
        const ceilingGroup = new THREE.Group();
        mazeGroup.add(wallsGroup);
        mazeGroup.add(lightsGroup);
        mazeGroup.add(floorGroup);
        mazeGroup.add(ceilingGroup);
        scene.add(mazeGroup);

        // ─────────────────────────────────────
        // MATERIALS
        // ─────────────────────────────────────
        const wallMaterial = new THREE.MeshStandardMaterial({
            color: 0xd4c08a,
            roughness: 0.75,
            metalness: 0.05,
        });

        const wallMaterialAlt = new THREE.MeshStandardMaterial({
            color: 0xc8b478,
            roughness: 0.8,
            metalness: 0.04,
        });

        const floorMaterial = new THREE.MeshStandardMaterial({
            color: 0x3a3530,
            roughness: 0.55,
            metalness: 0.08,
        });

        const ceilingMaterial = new THREE.MeshStandardMaterial({
            color: 0x4a4540,
            roughness: 0.7,
            metalness: 0.1,
        });

        // ─────────────────────────────────────
        // LIGHTING
        // ─────────────────────────────────────
        const ambientLight = new THREE.AmbientLight(0x2a2520, 0.7);
        scene.add(ambientLight);

        const globalPointLight = new THREE.PointLight(0xffeedd, 8, 30, 1.5);
        globalPointLight.position.set(15, 6, 15);
        globalPointLight.castShadow = true;
        globalPointLight.shadow.mapSize.width = 512;
        globalPointLight.shadow.mapSize.height = 512;
        globalPointLight.shadow.camera.near = 0.3;
        globalPointLight.shadow.camera.far = 50;
        globalPointLight.shadow.bias = -0.0005;
        scene.add(globalPointLight);

        // ─────────────────────────────────────
        // PLAYER
        // ─────────────────────────────────────
        const playerPosition = new THREE.Vector3();
        const playerEuler = { x: 0, y: 0 };
        const keysPressed = {};
        let pointerLocked = false;

        function resetPlayer() {
            const gs = GAME_STATE.gridSize;
            const rs = GAME_STATE.roomSize;
            const sx = GAME_STATE.startPosition?.col ?? 0;
            const sy = GAME_STATE.startPosition?.row ?? 0;
            playerPosition.set(sx * rs + rs / 2, 1.6, sy * rs + rs / 2);
            playerEuler.x = 0;
            playerEuler.y = Math.PI / 4;
            camera.position.copy(playerPosition);
            camera.rotation.set(0, playerEuler.y, 0);
        }

        // ─────────────────────────────────────
        // SHADOW ENTITIES
        // ─────────────────────────────────────
        const entities = [];
        const entityGroup = new THREE.Group();
        scene.add(entityGroup);

        function createEntityMesh() {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({
                color: 0x080808,
                roughness: 1,
                metalness: 0,
                transparent: true,
                opacity: 0.85,
            });
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.35, 1.0, 4, 8), bodyMat);
            body.position.y = 1.1;
            body.castShadow = true;
            group.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.28, 8, 6), bodyMat);
            head.position.y = 2.0;
            head.castShadow = true;
            group.add(head);
            const limbMat = new THREE.MeshStandardMaterial({
                color: 0x050505,
                roughness: 1,
                metalness: 0,
                transparent: true,
                opacity: 0.7,
            });
            for (let i = -1; i <= 1; i += 2) {
                const arm = new THREE.Mesh(new THREE.CapsuleGeometry(0.1, 0.7, 4, 6), limbMat);
                arm.position.set(i * 0.4, 1.5, 0);
                arm.rotation.z = i * 0.3;
                group.add(arm);
            }
            group.userData = {
                bodyMesh: body,
                headMesh: head,
                baseOpacity: 0.85,
                animationPhase: Math.random() * Math.PI * 2,
                animationSpeed: 0.4 + Math.random() * 0.8,
            };
            return group;
        }

        function spawnEntity(row, col) {
            const rs = GAME_STATE.roomSize;
            const ex = col * rs + rs / 2;
            const ez = row * rs + rs / 2;
            const mesh = createEntityMesh();
            mesh.position.set(ex, 0, ez);
            mesh.visible = true;
            mesh.userData.gridRow = row;
            mesh.userData.gridCol = col;
            mesh.userData.spawnTime = performance.now() / 1000;
            mesh.userData.state = 'idle';
            mesh.userData.chargeTarget = null;
            mesh.userData.vanished = false;
            entityGroup.add(mesh);
            entities.push(mesh);
            return mesh;
        }

        function despawnEntity(entity) {
            entity.userData.state = 'vanishing';
            entity.userData.vanished = true;
            entity.userData.vanishStart = performance.now() / 1000;
        }

        function cleanupEntities() {
            const now = performance.now() / 1000;
            for (let i = entities.length - 1; i >= 0; i--) {
                const e = entities[i];
                if (e.userData.vanished && now - e.userData.vanishStart > 0.5) {
                    entityGroup.remove(e);
                    entities.splice(i, 1);
                }
            }
        }

        // ─────────────────────────────────────
        // KEY & EXIT MESHES
        // ─────────────────────────────────────
        const keyGroup = new THREE.Group();
        const exitGroup = new THREE.Group();
        scene.add(keyGroup);
        scene.add(exitGroup);

        let keyMesh = null;
        let exitMarkerMesh = null;

        function createKeyMesh() {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({
                color: 0xffd700,
                roughness: 0.2,
                metalness: 0.9,
                emissive: 0xffd700,
                emissiveIntensity: 0.6,
            });
            const bow = new THREE.Mesh(new THREE.TorusGeometry(0.22, 0.06, 8, 12), mat);
            bow.rotation.x = Math.PI / 2;
            group.add(bow);
            const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.5, 8), mat);
            shaft.position.y = -0.25;
            group.add(shaft);
            const bit = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.15, 0.06), mat);
            bit.position.y = -0.48;
            group.add(bit);
            const glowLight = new THREE.PointLight(0xffd700, 1.5, 4, 2);
            glowLight.position.y = 0;
            group.add(glowLight);
            group.userData = { glowLight, baseY: 0 };
            return group;
        }

        function createExitMarker() {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({
                color: 0x00cc88,
                roughness: 0.2,
                metalness: 0.7,
                emissive: 0x00cc88,
                emissiveIntensity: 0.5,
            });
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.08, 16, 32), mat);
            ring.rotation.x = Math.PI / 2;
            ring.position.y = 0.1;
            group.add(ring);
            const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 2.5, 8), mat);
            pillar.position.y = 1.25;
            group.add(pillar);
            const glowLight = new THREE.PointLight(0x00cc88, 2, 6, 2);
            glowLight.position.y = 1.5;
            group.add(glowLight);
            group.userData = { glowLight };
            return group;
        }

        function placeKey(row, col) {
            keyGroup.clear();
            if (keyMesh) keyMesh.userData?.glowLight?.dispose();
            keyMesh = createKeyMesh();
            const rs = GAME_STATE.roomSize;
            keyMesh.position.set(col * rs + rs / 2, 1.3, row * rs + rs / 2);
            keyMesh.userData.baseY = keyMesh.position.y;
            keyMesh.userData.gridRow = row;
            keyMesh.userData.gridCol = col;
            keyGroup.add(keyMesh);
            GAME_STATE.keyPosition = { row, col };
        }

        function placeExit(row, col) {
            exitGroup.clear();
            if (exitMarkerMesh) exitMarkerMesh.userData?.glowLight?.dispose();
            exitMarkerMesh = createExitMarker();
            const rs = GAME_STATE.roomSize;
            exitMarkerMesh.position.set(col * rs + rs / 2, 0, row * rs + rs / 2);
            exitMarkerMesh.userData.gridRow = row;
            exitMarkerMesh.userData.gridCol = col;
            exitGroup.add(exitMarkerMesh);
            GAME_STATE.exitPosition = { row, col };
        }

        function removeKey() {
            if (keyMesh) {
                keyGroup.remove(keyMesh);
                keyMesh.traverse(c => { if (c.material) c.material.dispose(); });
                keyMesh = null;
            }
            GAME_STATE.keyPosition = null;
        }

        function removeExit() {
            if (exitMarkerMesh) {
                exitGroup.remove(exitMarkerMesh);
                exitMarkerMesh.traverse(c => { if (c.material) c.material.dispose(); });
                exitMarkerMesh = null;
            }
            GAME_STATE.exitPosition = null;
        }

        // ─────────────────────────────────────
        // MAZE GENERATION
        // ─────────────────────────────────────
        function clearMaze() {
            wallsGroup.clear();
            lightsGroup.clear();
            floorGroup.clear();
            ceilingGroup.clear();
            wallMeshes = {};
            wallTypes = {};
            wallLastObserved = {};
            cellLightFlicker = [];
            cellLightMeshes = [];
            entities.forEach(e => entityGroup.remove(e));
            entities.length = 0;
            keyGroup.clear();
            exitGroup.clear();
            keyMesh = null;
            exitMarkerMesh = null;
        }

        function generateMaze(level) {
            clearMaze();
            const gs = GAME_STATE.gridSize;
            const rs = GAME_STATE.roomSize;
            const wh = GAME_STATE.wallHeight;

            horizontalWalls = [];
            verticalWalls = [];
            for (let r = 0; r < gs; r++) {
                horizontalWalls[r] = [];
                verticalWalls[r] = [];
                for (let c = 0; c < gs; c++) {
                    if (r < gs - 1) horizontalWalls[r][c] = 'solid';
                    if (c < gs - 1) verticalWalls[r][c] = 'solid';
                }
            }

            const visited = Array.from({ length: gs }, () => Array(gs).fill(false));
            const stack = [{ r: 0, c: 0 }];
            visited[0][0] = true;

            const directions = [
                { dr: -1, dc: 0, wallType: 'h', wallR: (r,c)=>r-1, wallC: (r,c)=>c },
                { dr: 1, dc: 0, wallType: 'h', wallR: (r,c)=>r, wallC: (r,c)=>c },
                { dr: 0, dc: -1, wallType: 'v', wallR: (r,c)=>r, wallC: (r,c)=>c-1 },
                { dr: 0, dc: 1, wallType: 'v', wallR: (r,c)=>r, wallC: (r,c)=>c },
            ];

            while (stack.length) {
                const { r, c } = stack[stack.length - 1];
                const neighbors = [];
                for (const d of directions) {
                    const nr = r + d.dr, nc = c + d.dc;
                    if (nr >= 0 && nr < gs && nc >= 0 && nc < gs && !visited[nr][nc]) {
                        neighbors.push({ nr, nc, ...d });
                    }
                }
                if (!neighbors.length) stack.pop();
                else {
                    const chosen = neighbors[Math.floor(Math.random() * neighbors.length)];
                    visited[chosen.nr][chosen.nc] = true;
                    const wr = chosen.wallR(r, c), wc = chosen.wallC(r, c);
                    if (chosen.wallType === 'h' && wr >= 0 && wr < gs - 1) horizontalWalls[wr][wc] = 'open';
                    else if (chosen.wallType === 'v' && wc >= 0 && wc < gs - 1) verticalWalls[wr][wc] = 'open';
                    stack.push({ r: chosen.nr, c: chosen.nc });
                }
            }

            const extraConn = Math.floor(gs * gs * 0.15);
            for (let i = 0; i < extraConn; i++) {
                const r = Math.floor(Math.random() * gs), c = Math.floor(Math.random() * gs);
                if (Math.random() < 0.5 && r < gs - 1 && horizontalWalls[r][c] === 'solid') horizontalWalls[r][c] = 'open';
                else if (c < gs - 1 && verticalWalls[r][c] === 'solid') verticalWalls[r][c] = 'open';
            }

            const quantumFraction = 0.15 + level * 0.12;
            const allWallKeys = [];
            for (let r = 0; r < gs - 1; r++) for (let c = 0; c < gs; c++) if (horizontalWalls[r][c] === 'open') allWallKeys.push({ type: 'h', r, c });
            for (let r = 0; r < gs; r++) for (let c = 0; c < gs - 1; c++) if (verticalWalls[r][c] === 'open') allWallKeys.push({ type: 'v', r, c });
            const numQuantum = Math.floor(allWallKeys.length * quantumFraction);
            const shuffled = [...allWallKeys].sort(() => Math.random() - 0.5);
            for (let i = 0; i < Math.min(numQuantum, shuffled.length); i++) {
                const wk = shuffled[i];
                const key = `${wk.type}-${wk.r}-${wk.c}`;
                wallTypes[key] = 'quantum';
                if (wk.type === 'h') horizontalWalls[wk.r][wk.c] = 'quantum';
                else verticalWalls[wk.r][wk.c] = 'quantum';
            }

            for (let r = 0; r < gs - 1; r++) for (let c = 0; c < gs; c++) {
                const key = `h-${r}-${c}`;
                if (!wallTypes[key]) wallTypes[key] = horizontalWalls[r][c];
            }
            for (let r = 0; r < gs; r++) for (let c = 0; c < gs - 1; c++) {
                const key = `v-${r}-${c}`;
                if (!wallTypes[key]) wallTypes[key] = verticalWalls[r][c];
            }

            GAME_STATE.startPosition = { row: 0, col: 0 };
            const exitR = gs - 1, exitC = gs - 1;
            let keyR, keyC;
            do {
                keyR = Math.floor(Math.random() * gs);
                keyC = Math.floor(Math.random() * gs);
            } while ((keyR === 0 && keyC === 0) || (keyR === exitR && keyC === exitC));

            // ----- MISSING KEY/EXIT LOGIC -----
            const levelFactor = level - 1;
            const keyMissingChance = Math.min(0.4, levelFactor * 0.1);
            const exitMissingChance = Math.min(0.35, levelFactor * 0.08);
            const keyExists = Math.random() > keyMissingChance;
            const exitExists = Math.random() > exitMissingChance;

            if (keyExists) {
                GAME_STATE.keyPosition = { row: keyR, col: keyC };
                ensurePathExists({ row: 0, col: 0 }, GAME_STATE.keyPosition);
            } else {
                GAME_STATE.keyPosition = null;
            }

            if (exitExists) {
                GAME_STATE.exitPosition = { row: exitR, col: exitC };
                if (keyExists) ensurePathExists(GAME_STATE.keyPosition, GAME_STATE.exitPosition);
            } else {
                GAME_STATE.exitPosition = null;
            }

            GAME_STATE.playerHasKey = false;

            buildMazeGeometry();

            if (keyExists) placeKey(keyR, keyC);
            else keyGroup.clear();
            if (exitExists) placeExit(exitR, exitC);
            else exitGroup.clear();

            const now = performance.now() / 1000;
            for (const key in wallTypes) wallLastObserved[key] = now;

            cellLightFlicker = Array.from({ length: gs }, () =>
                Array.from({ length: gs }, () => ({
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.3 + Math.random() * 1.5,
                    intensity: 0.6 + Math.random() * 0.4,
                    nextFlicker: now + Math.random() * 5,
                }))
            );
        }

        function ensurePathExists(from, to) {
            if (!from || !to) return;
            const gs = GAME_STATE.gridSize;
            const visited = Array.from({ length: gs }, () => Array(gs).fill(false));
            const queue = [{ r: from.row, c: from.col }];
            visited[from.row][from.col] = true;
            const dirs = [
                { dr: -1, dc: 0, wType: 'h', wrOff: -1 },
                { dr: 1, dc: 0, wType: 'h', wrOff: 0 },
                { dr: 0, dc: -1, wType: 'v', wcOff: -1 },
                { dr: 0, dc: 1, wType: 'v', wcOff: 0 },
            ];
            while (queue.length) {
                const { r, c } = queue.shift();
                if (r === to.row && c === to.col) return;
                for (const d of dirs) {
                    const nr = r + d.dr, nc = c + d.dc;
                    if (nr < 0 || nr >= gs || nc < 0 || nc >= gs || visited[nr][nc]) continue;
                    const wr = d.wType === 'h' ? (d.wrOff === -1 ? r - 1 : r) : r;
                    const wc = d.wType === 'v' ? (d.wcOff === -1 ? c - 1 : c) : c;
                    const key = `${d.wType}-${wr}-${wc}`;
                    const wtype = wallTypes[key] || 'solid';
                    if (wtype === 'open' || wtype === 'quantum') {
                        visited[nr][nc] = true;
                        queue.push({ r: nr, c: nc });
                    }
                }
            }
            carvePath(from, to);
        }

        function carvePath(from, to) {
            const gs = GAME_STATE.gridSize;
            let cr = from.row, cc = from.col;
            while (cr !== to.row || cc !== to.col) {
                const dr = Math.sign(to.row - cr), dc = Math.sign(to.col - cc);
                if (dr !== 0 && (Math.random() < 0.5 || dc === 0)) {
                    const wr = dr === -1 ? cr - 1 : cr, wc = cc;
                    const key = `h-${wr}-${wc}`;
                    if (wr >= 0 && wr < gs - 1) {
                        wallTypes[key] = 'open';
                        horizontalWalls[wr][wc] = 'open';
                    }
                    cr += dr;
                } else if (dc !== 0) {
                    const wr = cr, wc = dc === -1 ? cc - 1 : cc;
                    const key = `v-${wr}-${wc}`;
                    if (wc >= 0 && wc < gs - 1) {
                        wallTypes[key] = 'open';
                        verticalWalls[wr][wc] = 'open';
                    }
                    cc += dc;
                }
            }
        }

        function buildMazeGeometry() {
            const gs = GAME_STATE.gridSize, rs = GAME_STATE.roomSize, wh = GAME_STATE.wallHeight, wt = 0.2;

            const floorGeo = new THREE.PlaneGeometry(gs * rs + 1, gs * rs + 1);
            const floorMesh = new THREE.Mesh(floorGeo, floorMaterial);
            floorMesh.rotation.x = -Math.PI / 2;
            floorMesh.position.set((gs * rs) / 2, -0.05, (gs * rs) / 2);
            floorMesh.receiveShadow = true;
            floorGroup.add(floorMesh);

            const ceilGeo = new THREE.PlaneGeometry(gs * rs + 1, gs * rs + 1);
            const ceilMesh = new THREE.Mesh(ceilGeo, ceilingMaterial);
            ceilMesh.rotation.x = Math.PI / 2;
            ceilMesh.position.set((gs * rs) / 2, wh + 0.05, (gs * rs) / 2);
            ceilMesh.receiveShadow = true;
            ceilingGroup.add(ceilMesh);

            const outerWallGeoH = new THREE.BoxGeometry(gs * rs + 2, wh, wt);
            const outerWallGeoV = new THREE.BoxGeometry(wt, wh, gs * rs + 2);
            const outerWalls = [
                { geo: outerWallGeoH, pos: [(gs * rs) / 2, wh / 2, -wt / 2] },
                { geo: outerWallGeoH, pos: [(gs * rs) / 2, wh / 2, gs * rs + wt / 2] },
                { geo: outerWallGeoV, pos: [-wt / 2, wh / 2, (gs * rs) / 2] },
                { geo: outerWallGeoV, pos: [gs * rs + wt / 2, wh / 2, (gs * rs) / 2] },
            ];
            outerWalls.forEach(ow => {
                const mesh = new THREE.Mesh(ow.geo, wallMaterial);
                mesh.position.set(...ow.pos);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.userData.isOuter = true;
                wallsGroup.add(mesh);
            });

            for (let r = 0; r < gs - 1; r++) {
                for (let c = 0; c < gs; c++) {
                    const key = `h-${r}-${c}`;
                    const wtype = wallTypes[key] || 'solid';
                    if (wtype === 'solid' || wtype === 'quantum') {
                        const wx = c * rs + rs / 2, wz = (r + 1) * rs;
                        const mesh = new THREE.Mesh(new THREE.BoxGeometry(rs + wt, wh, wt), wtype === 'quantum' ? wallMaterialAlt : wallMaterial);
                        mesh.position.set(wx, wh / 2, wz);
                        mesh.castShadow = true; mesh.receiveShadow = true;
                        mesh.userData.wallKey = key; mesh.userData.wallType = wtype;
                        wallMeshes[key] = mesh;
                        wallsGroup.add(mesh);
                    }
                }
            }
            for (let r = 0; r < gs; r++) {
                for (let c = 0; c < gs - 1; c++) {
                    const key = `v-${r}-${c}`;
                    const wtype = wallTypes[key] || 'solid';
                    if (wtype === 'solid' || wtype === 'quantum') {
                        const wx = (c + 1) * rs, wz = r * rs + rs / 2;
                        const mesh = new THREE.Mesh(new THREE.BoxGeometry(wt, wh, rs + wt), wtype === 'quantum' ? wallMaterialAlt : wallMaterial);
                        mesh.position.set(wx, wh / 2, wz);
                        mesh.castShadow = true; mesh.receiveShadow = true;
                        mesh.userData.wallKey = key; mesh.userData.wallType = wtype;
                        wallMeshes[key] = mesh;
                        wallsGroup.add(mesh);
                    }
                }
            }

            for (let r = 0; r < gs; r++) {
                cellLightMeshes[r] = [];
                for (let c = 0; c < gs; c++) {
                    const lx = c * rs + rs / 2, lz = r * rs + rs / 2;
                    const lightGeo = new THREE.BoxGeometry(1.2, 0.08, 0.5);
                    const lightMat = new THREE.MeshStandardMaterial({ color: 0xfff8e8, roughness: 0.2, metalness: 0.1, emissive: 0xfff8e8, emissiveIntensity: 1.0 });
                    const lightMesh = new THREE.Mesh(lightGeo, lightMat);
                    lightMesh.position.set(lx, wh - 0.05, lz);
                    const ptLight = new THREE.PointLight(0xffeedd, 1.8, 8, 2);
                    ptLight.position.set(lx, wh - 0.2, lz);
                    ptLight.userData.baseIntensity = 1.8;
                    lightMesh.userData = { pointLight: ptLight };
                    cellLightMeshes[r][c] = lightMesh;
                    lightsGroup.add(lightMesh);
                    lightsGroup.add(ptLight);
                }
            }
        }

        function updateWallMesh(key) {
            const mesh = wallMeshes[key];
            const wtype = wallTypes[key];
            if (!mesh && (wtype === 'solid' || wtype === 'quantum')) {
                const parts = key.split('-'), type = parts[0], r = parseInt(parts[1]), c = parseInt(parts[2]);
                const rs = GAME_STATE.roomSize, wh = GAME_STATE.wallHeight, wt = 0.2;
                let geo, wx, wz;
                if (type === 'h') { geo = new THREE.BoxGeometry(rs + wt, wh, wt); wx = c * rs + rs / 2; wz = (r + 1) * rs; }
                else { geo = new THREE.BoxGeometry(wt, wh, rs + wt); wx = (c + 1) * rs; wz = r * rs + rs / 2; }
                const newMesh = new THREE.Mesh(geo, wtype === 'quantum' ? wallMaterialAlt : wallMaterial);
                newMesh.position.set(wx, wh / 2, wz);
                newMesh.castShadow = true; newMesh.receiveShadow = true;
                newMesh.userData = { wallKey: key, wallType: wtype, isHorizontal: type === 'h' };
                wallMeshes[key] = newMesh;
                wallsGroup.add(newMesh);
            } else if (mesh && wtype === 'open') {
                wallsGroup.remove(mesh);
                mesh.geometry?.dispose();
                mesh.material?.dispose();
                delete wallMeshes[key];
            } else if (mesh && (wtype === 'solid' || wtype === 'quantum')) {
                mesh.material = wtype === 'quantum' ? wallMaterialAlt : wallMaterial;
                mesh.userData.wallType = wtype;
                mesh.visible = true;
            }
        }

        // ─────────────────────────────────────
        // OBSERVATION & QUANTUM EFFECTS
        // ─────────────────────────────────────
        function getPlayerGridPos() {
            const rs = GAME_STATE.roomSize;
            const col = Math.round(playerPosition.x / rs - 0.5);
            const row = Math.round(playerPosition.z / rs - 0.5);
            return {
                row: Math.max(0, Math.min(GAME_STATE.gridSize - 1, row)),
                col: Math.max(0, Math.min(GAME_STATE.gridSize - 1, col)),
            };
        }

        function isWallObserved(wallKey) {
            const parts = wallKey.split('-'), type = parts[0], wr = parseInt(parts[1]), wc = parseInt(parts[2]);
            const rs = GAME_STATE.roomSize;
            let wx, wz;
            if (type === 'h') { wx = wc * rs + rs / 2; wz = (wr + 1) * rs; }
            else { wx = (wc + 1) * rs; wz = wr * rs + rs / 2; }
            const dx = wx - playerPosition.x, dz = wz - playerPosition.z;
            const dist = Math.sqrt(dx*dx + dz*dz);
            if (dist > 18) return false;
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const toWall = new THREE.Vector3(dx, 0, dz).normalize();
            const dot = forward.dot(toWall);
            return (dot > 0.15 && dist < 14) || (dot > -0.1 && dist < 6);
        }

        function updateObservation() {
            const now = performance.now() / 1000;
            for (const key in wallTypes) {
                if (isWallObserved(key)) wallLastObserved[key] = now;
            }
        }

        function wallChangeEffect(position) {
            const light = new THREE.PointLight(0xaaaaff, 2, 4, 2);
            light.position.copy(position);
            scene.add(light);
            setTimeout(() => scene.remove(light), 200);
            for (let i = 0; i < 10; i++) {
                const geo = new THREE.SphereGeometry(0.05, 2, 2);
                const mat = new THREE.MeshBasicMaterial({ color: 0xaaaaff, transparent: true, opacity: 0.8 });
                const particle = new THREE.Mesh(geo, mat);
                particle.position.set(
                    position.x + (Math.random() - 0.5) * 1.2,
                    position.y + Math.random() * 1.5,
                    position.z + (Math.random() - 0.5) * 1.2
                );
                scene.add(particle);
                setTimeout(() => { scene.remove(particle); geo.dispose(); mat.dispose(); }, 500);
            }
        }

        function triggerQuantumFluctuation() {
            const now = performance.now() / 1000;
            const chaosLevel = GAME_STATE.currentLevel * 0.18;
            const candidates = [];
            for (const key in wallTypes) {
                if (wallTypes[key] !== 'quantum') continue;
                const lastSeen = wallLastObserved[key] || now;
                if (now - lastSeen > 1.0 && !isWallObserved(key)) {
                    const probability = Math.min(0.8, (now - lastSeen - 1.0) * 0.2 * (1 + chaosLevel));
                    if (Math.random() < probability) candidates.push(key);
                }
            }
            if (candidates.length > 0) {
                const numChanges = Math.min(candidates.length, 1 + Math.floor(Math.random() * 3 * (1 + chaosLevel)));
                const shuffled = candidates.sort(() => Math.random() - 0.5);
                for (let i = 0; i < numChanges; i++) {
                    const key = shuffled[i];
                    const currentState = wallTypes[key];
                    const newState = currentState === 'quantum' ? (Math.random() < 0.5 ? 'solid' : 'open') : (currentState === 'solid' ? 'open' : 'solid');
                    wallTypes[key] = newState;
                    const parts = key.split('-');
                    if (parts[0] === 'h') horizontalWalls[parseInt(parts[1])][parseInt(parts[2])] = newState;
                    else verticalWalls[parseInt(parts[1])][parseInt(parts[2])] = newState;
                    const mesh = wallMeshes[key];
                    if (mesh) wallChangeEffect(mesh.position);
                    updateWallMesh(key);
                    wallLastObserved[key] = now;
                }
                if (numChanges > 0 && Math.random() < 0.6) playDistantDoor();
                GAME_STATE.quantumInstability = Math.min(1, GAME_STATE.quantumInstability + 0.15);
            }
        }

        function checkQuantumTunneling() {
            const now = performance.now() / 1000;
            if (now - GAME_STATE.lastTunnelTime < GAME_STATE.tunnelCooldown) return false;
            const chaosLevel = GAME_STATE.currentLevel * 0.08;
            const baseChance = 0.015 + chaosLevel;
            if (Math.random() < baseChance * (1 + GAME_STATE.quantumInstability)) {
                GAME_STATE.lastTunnelTime = now;
                GAME_STATE.quantumInstability = Math.max(0, GAME_STATE.quantumInstability - 0.3);
                return true;
            }
            return false;
        }

        function attemptQuantumTunnel() {
            const rs = GAME_STATE.roomSize, gs = GAME_STATE.gridSize;
            const px = playerPosition.x, pz = playerPosition.z;
            const candidates = [];
            for (const key in wallTypes) {
                const wtype = wallTypes[key];
                if (wtype !== 'solid' && wtype !== 'quantum') continue;
                const parts = key.split('-'), type = parts[0], wr = parseInt(parts[1]), wc = parseInt(parts[2]);
                let wx, wz;
                if (type === 'h') { wx = wc * rs + rs / 2; wz = (wr + 1) * rs; }
                else { wx = (wc + 1) * rs; wz = wr * rs + rs / 2; }
                const dist = Math.sqrt((px - wx) ** 2 + (pz - wz) ** 2);
                if (dist < 1.8) candidates.push({ key, type, wx, wz, dist });
            }
            if (!candidates.length) return false;
            candidates.sort((a, b) => a.dist - b.dist);
            const target = candidates[0];
            const offset = 2.5;
            if (target.type === 'h') playerPosition.z = target.wz + (pz < target.wz ? -1 : 1) * offset;
            else playerPosition.x = target.wx + (px < target.wx ? -1 : 1) * offset;
            playerPosition.x = Math.max(0.5, Math.min(gs * rs - 0.5, playerPosition.x));
            playerPosition.z = Math.max(0.5, Math.min(gs * rs - 0.5, playerPosition.z));
            GAME_STATE.screenShakeAmount = 0.6;
            playThud(0.2, 40);
            wallChangeEffect(new THREE.Vector3(playerPosition.x, 1.6, playerPosition.z));
            return true;
        }

        // ─────────────────────────────────────
        // ENTANGLED DOORS
        // ─────────────────────────────────────
        let entangledPairs = [];

        function setupEntangledDoors() {
            entangledPairs = [];
            const quantumWalls = [];
            for (const key in wallTypes) if (wallTypes[key] === 'quantum') quantumWalls.push(key);
            const numPairs = Math.min(3 + GAME_STATE.currentLevel, Math.floor(quantumWalls.length / 2));
            const shuffled = [...quantumWalls].sort(() => Math.random() - 0.5);
            for (let i = 0; i < numPairs * 2; i += 2) {
                if (i + 1 < shuffled.length) entangledPairs.push([shuffled[i], shuffled[i + 1]]);
            }
        }

        function triggerEntangledPartner(changedKey) {
            for (const pair of entangledPairs) {
                if (pair[0] === changedKey || pair[1] === changedKey) {
                    const partner = pair[0] === changedKey ? pair[1] : pair[0];
                    if (wallTypes[partner] === 'quantum') {
                        const newState = Math.random() < 0.5 ? 'solid' : 'open';
                        wallTypes[partner] = newState;
                        const parts = partner.split('-');
                        if (parts[0] === 'h') horizontalWalls[parseInt(parts[1])][parseInt(parts[2])] = newState;
                        else verticalWalls[parseInt(parts[1])][parseInt(parts[2])] = newState;
                        updateWallMesh(partner);
                        wallLastObserved[partner] = performance.now() / 1000;
                        playDistantDoor();
                    }
                }
            }
        }

        // ─────────────────────────────────────
        // COLLISION
        // ─────────────────────────────────────
        function isPositionBlocked(x, z, radius = 0.45) {
            const rs = GAME_STATE.roomSize, gs = GAME_STATE.gridSize;
            if (x - radius < 0 || x + radius > gs * rs || z - radius < 0 || z + radius > gs * rs) return true;
            for (const key in wallTypes) {
                const wtype = wallTypes[key];
                if (wtype !== 'solid' && wtype !== 'quantum') continue;
                const parts = key.split('-'), type = parts[0], wr = parseInt(parts[1]), wc = parseInt(parts[2]);
                let wx, wz;
                const wt = 0.2, rs = GAME_STATE.roomSize;
                if (type === 'h') {
                    wx = wc * rs + rs / 2; wz = (wr + 1) * rs;
                    if (Math.abs(x - wx) < (rs / 2 + wt) + radius && Math.abs(z - wz) < wt / 2 + radius) return true;
                } else {
                    wx = (wc + 1) * rs; wz = wr * rs + rs / 2;
                    if (Math.abs(x - wx) < wt / 2 + radius && Math.abs(z - wz) < (rs / 2 + wt) + radius) return true;
                }
            }
            return false;
        }

        function resolveCollision(desiredX, desiredZ, radius = 0.45) {
            if (!isPositionBlocked(desiredX, desiredZ, radius)) return { x: desiredX, z: desiredZ, blocked: false };
            if (!isPositionBlocked(desiredX, playerPosition.z, radius)) return { x: desiredX, z: playerPosition.z, blocked: true };
            if (!isPositionBlocked(playerPosition.x, desiredZ, radius)) return { x: playerPosition.x, z: desiredZ, blocked: true };
            return { x: playerPosition.x, z: playerPosition.z, blocked: true };
        }

        // ─────────────────────────────────────
        // INPUT & INTERACTION
        // ─────────────────────────────────────
        document.addEventListener('keydown', (e) => { keysPressed[e.code] = true; if (e.code === 'KeyF') tryInteract(); });
        document.addEventListener('keyup', (e) => { keysPressed[e.code] = false; });
        document.addEventListener('mousemove', (e) => {
            if (!pointerLocked || !GAME_STATE.gameActive) return;
            playerEuler.y -= e.movementX * 0.002;
            playerEuler.x -= e.movementY * 0.002;
            playerEuler.x = Math.max(-Math.PI / 2.3, Math.min(Math.PI / 2.3, playerEuler.x));
        });
        document.addEventListener('click', () => {
            if (GAME_STATE.gameActive && !pointerLocked) renderer.domElement.requestPointerLock();
        });
        document.addEventListener('pointerlockchange', () => {
            pointerLocked = document.pointerLockElement === renderer.domElement;
            if (!pointerLocked && GAME_STATE.gameActive) {
                hintEl.style.opacity = '1';
                hintEl.textContent = 'CLICK TO FOCUS';
                setTimeout(() => { hintEl.style.opacity = '0'; }, 2500);
            }
        });

        function tryInteract() {
            if (!GAME_STATE.gameActive || GAME_STATE.levelComplete) return;
            const rs = GAME_STATE.roomSize;
            const px = playerPosition.x, pz = playerPosition.z;
            if (keyMesh && !GAME_STATE.playerHasKey) {
                const dist = Math.sqrt((px - keyMesh.position.x) ** 2 + (pz - keyMesh.position.z) ** 2);
                if (dist < 2.0) {
                    GAME_STATE.playerHasKey = true;
                    keyGroup.remove(keyMesh);
                    keyMesh.traverse(c => { if (c.material) c.material.dispose(); });
                    keyMesh = null;
                    GAME_STATE.keyPosition = null;
                    playThud(0.4, 200);
                    hintEl.style.opacity = '1';
                    hintEl.textContent = 'KEY ACQUIRED';
                    setTimeout(() => { hintEl.style.opacity = '0'; }, 3000);
                    return;
                }
            }
            if (GAME_STATE.playerHasKey && exitMarkerMesh) {
                const dist = Math.sqrt((px - exitMarkerMesh.position.x) ** 2 + (pz - exitMarkerMesh.position.z) ** 2);
                if (dist < 2.2) { completeLevel(); return; }
            }
            for (const key in wallTypes) {
                if (wallTypes[key] !== 'quantum') continue;
                const parts = key.split('-'), type = parts[0], wr = parseInt(parts[1]), wc = parseInt(parts[2]);
                let wx, wz;
                if (type === 'h') { wx = wc * rs + rs / 2; wz = (wr + 1) * rs; }
                else { wx = (wc + 1) * rs; wz = wr * rs + rs / 2; }
                if (Math.sqrt((px - wx) ** 2 + (pz - wz) ** 2) < 2.5) {
                    const newState = wallTypes[key] === 'solid' ? 'open' : 'solid';
                    wallTypes[key] = newState;
                    if (type === 'h') horizontalWalls[wr][wc] = newState;
                    else verticalWalls[wr][wc] = newState;
                    updateWallMesh(key);
                    wallLastObserved[key] = performance.now() / 1000;
                    triggerEntangledPartner(key);
                    playThud(0.15, 80);
                    return;
                }
            }
        }

        function completeLevel() {
            GAME_STATE.levelComplete = true;
            GAME_STATE.gameActive = false;
            hintEl.style.opacity = '1';
            if (GAME_STATE.currentLevel >= GAME_STATE.maxLevel) {
                hintEl.textContent = 'YOU ESCAPED THE QUANTUM MAZE';
                setTimeout(() => { hintEl.style.opacity = '0'; resetGame(); }, 4000);
            } else {
                hintEl.textContent = `LEVEL ${GAME_STATE.currentLevel} COMPLETE`;
                setTimeout(() => { GAME_STATE.currentLevel++; startLevel(); }, 3500);
            }
        }

        function resetGame() {
            GAME_STATE.currentLevel = 1;
            GAME_STATE.gridSize = 6;
            GAME_STATE.playerHasKey = false;
            GAME_STATE.levelComplete = false;
            GAME_STATE.quantumInstability = 0;
            GAME_STATE.totalChaos = 0;
            GAME_STATE.jumpscareCooldown = 0;
            GAME_STATE.screenShakeAmount = 0;
            GAME_STATE.lastTunnelTime = 0;
            GAME_STATE.heartbeating = false;
            clearMaze();
            generateMaze(1);
            setupEntangledDoors();
            resetPlayer();
            GAME_STATE.gameActive = true;
            GAME_STATE.levelComplete = false;
            hintEl.style.opacity = '0';
        }

        function startLevel() {
            const level = GAME_STATE.currentLevel;
            GAME_STATE.gridSize = 6 + Math.floor((level - 1) * 1.2);
            GAME_STATE.playerHasKey = false;
            GAME_STATE.levelComplete = false;
            GAME_STATE.quantumInstability = level * 0.08;
            GAME_STATE.totalChaos = level * 0.1;
            GAME_STATE.jumpscareCooldown = 0;
            GAME_STATE.screenShakeAmount = 0;
            GAME_STATE.lastTunnelTime = 0;
            clearMaze();
            generateMaze(level);
            setupEntangledDoors();
            resetPlayer();
            GAME_STATE.gameActive = true;
            hintEl.style.opacity = '1';
            hintEl.textContent = `LEVEL ${level} - FIND THE KEY`;
            setTimeout(() => { hintEl.style.opacity = '0'; }, 3000);
            if (pointerLocked) document.exitPointerLock();
        }

        // ─────────────────────────────────────
        // ENTITY AI
        // ─────────────────────────────────────
        function updateEntities(deltaTime) {
            const now = performance.now() / 1000;
            const chaosLevel = GAME_STATE.currentLevel * 0.12;
            if (entities.length < 2 + GAME_STATE.currentLevel && Math.random() < 0.012 * (1 + chaosLevel) && GAME_STATE.jumpscareCooldown <= 0) {
                const gs = GAME_STATE.gridSize, pg = getPlayerGridPos();
                let sr, sc;
                for (let i = 0; i < 30; i++) {
                    sr = Math.floor(Math.random() * gs); sc = Math.floor(Math.random() * gs);
                    if (Math.abs(sr - pg.row) + Math.abs(sc - pg.col) >= 3) break;
                }
                spawnEntity(sr, sc);
            }
            for (const entity of entities) {
                if (entity.userData.vanished) continue;
                const dx = playerPosition.x - entity.position.x, dz = playerPosition.z - entity.position.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                const toEntity = new THREE.Vector3(dx, 0, dz).normalize();
                const looking = forward.dot(toEntity) > 0.7 && dist < 12;
                if (entity.userData.state === 'idle') {
                    if (dist < 5 && !looking && Math.random() < 0.03) entity.userData.state = 'stalking';
                    else if (looking && Math.random() < 0.04) { despawnEntity(entity); }
                } else if (entity.userData.state === 'stalking') {
                    if (dist < 2.5 && GAME_STATE.jumpscareCooldown <= 0) triggerJumpscare(entity);
                    else if (looking && Math.random() < 0.08) { despawnEntity(entity); }
                    else {
                        const speed = 1.0 + chaosLevel;
                        entity.position.x += (dx / dist) * speed * deltaTime;
                        entity.position.z += (dz / dist) * speed * deltaTime;
                        entity.lookAt(playerPosition.x, entity.position.y, playerPosition.z);
                    }
                }
                if (entity.userData.vanished) {
                    const elapsed = now - entity.userData.vanishStart;
                    entity.traverse(c => { if (c.material && c.material.transparent) c.material.opacity = Math.max(0, 0.85 - elapsed * 1.7); });
                }
            }
            const nearby = entities.some(e => !e.userData.vanished && Math.hypot(playerPosition.x - e.position.x, playerPosition.z - e.position.z) < 7);
            GAME_STATE.heartbeating = nearby;
            if (GAME_STATE.heartbeating) {
                GAME_STATE.heartbeatTimer += deltaTime;
                if (GAME_STATE.heartbeatTimer > 1.5) { GAME_STATE.heartbeatTimer = 0; playHeartbeat(); }
            }
        }

        function triggerJumpscare(entity) {
            GAME_STATE.jumpscareCooldown = 4;
            GAME_STATE.screenShakeAmount = 1.5;
            playJumpscareSound();
            jumpscareFlash.style.opacity = '0.9';
            setTimeout(() => { jumpscareFlash.style.opacity = '0'; }, 120);
            const gs = GAME_STATE.gridSize, rs = GAME_STATE.roomSize;
            playerPosition.x = Math.floor(Math.random() * gs) * rs + rs / 2;
            playerPosition.z = Math.floor(Math.random() * gs) * rs + rs / 2;
            despawnEntity(entity);
            GAME_STATE.quantumInstability = Math.min(1, GAME_STATE.quantumInstability + 0.35);
        }

        // ─────────────────────────────────────
        // GAME LOOP
        // ─────────────────────────────────────
        const clock = new THREE.Clock();
        let quantumEventTimer = 0, flickerTimer = 0;

        function update(deltaTime) {
            if (!GAME_STATE.gameActive || GAME_STATE.levelComplete) {
                camera.rotation.order = 'YXZ';
                camera.rotation.y = playerEuler.y;
                camera.rotation.x = playerEuler.x;
                return;
            }
            deltaTime = Math.min(deltaTime, 0.2);
            if (GAME_STATE.jumpscareCooldown > 0) GAME_STATE.jumpscareCooldown -= deltaTime;
            if (GAME_STATE.screenShakeAmount > 0.001) GAME_STATE.screenShakeAmount *= Math.exp(-deltaTime * 4);
            else GAME_STATE.screenShakeAmount = 0;

            const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), playerEuler.y);
            const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), playerEuler.y);
            let moveX = 0, moveZ = 0;
            if (keysPressed['KeyW'] || keysPressed['ArrowUp']) { moveX += forward.x; moveZ += forward.z; }
            if (keysPressed['KeyS'] || keysPressed['ArrowDown']) { moveX -= forward.x; moveZ -= forward.z; }
            if (keysPressed['KeyA'] || keysPressed['ArrowLeft']) { moveX -= right.x; moveZ -= right.z; }
            if (keysPressed['KeyD'] || keysPressed['ArrowRight']) { moveX += right.x; moveZ += right.z; }
            if (moveX !== 0 || moveZ !== 0) {
                const len = Math.sqrt(moveX*moveX + moveZ*moveZ);
                moveX /= len; moveZ /= len;
                const desiredX = playerPosition.x + moveX * 5.5 * deltaTime;
                const desiredZ = playerPosition.z + moveZ * 5.5 * deltaTime;
                const resolved = resolveCollision(desiredX, desiredZ);
                if (resolved.blocked && checkQuantumTunneling()) {
                    if (!attemptQuantumTunnel()) { playerPosition.x = resolved.x; playerPosition.z = resolved.z; }
                } else { playerPosition.x = resolved.x; playerPosition.z = resolved.z; }
            }
            playerPosition.y = 1.6;
            camera.position.set(
                playerPosition.x + GAME_STATE.screenShakeAmount * (Math.random() - 0.5) * 0.3,
                playerPosition.y + GAME_STATE.screenShakeAmount * (Math.random() - 0.5) * 0.25,
                playerPosition.z + GAME_STATE.screenShakeAmount * (Math.random() - 0.5) * 0.3
            );
            camera.rotation.order = 'YXZ';
            camera.rotation.y = playerEuler.y;
            camera.rotation.x = playerEuler.x;

            updateObservation();
            quantumEventTimer += deltaTime;
            if (quantumEventTimer > 1.0 + Math.random() * 0.5) { quantumEventTimer = 0; triggerQuantumFluctuation(); }
            updateEntities(deltaTime);
            cleanupEntities();

            flickerTimer += deltaTime;
            if (flickerTimer > 0.3) {
                flickerTimer = 0;
                const now = performance.now() / 1000;
                for (let r = 0; r < GAME_STATE.gridSize; r++) for (let c = 0; c < GAME_STATE.gridSize; c++) {
                    if (!cellLightFlicker[r]?.[c]) continue;
                    const f = cellLightFlicker[r][c];
                    if (now > f.nextFlicker) { f.intensity = 0.25 + Math.random() * 0.75; f.nextFlicker = now + 0.5 + Math.random() * 4; }
                    const level = Math.max(0.3, Math.min(1.5, f.intensity + Math.sin(now * f.speed + f.phase) * 0.2));
                    const pt = cellLightMeshes[r]?.[c]?.userData?.pointLight;
                    if (pt) pt.intensity = pt.userData.baseIntensity * level;
                    if (cellLightMeshes[r]?.[c]?.material) cellLightMeshes[r][c].material.emissiveIntensity = level;
                }
            }

            if (keyMesh) { keyMesh.position.y = keyMesh.userData.baseY + Math.sin(performance.now() / 1000 * 2) * 0.25; keyMesh.rotation.y += deltaTime * 1.5; }
            if (exitMarkerMesh) { exitMarkerMesh.rotation.y += deltaTime * 0.6; if (exitMarkerMesh.userData.glowLight) exitMarkerMesh.userData.glowLight.intensity = 2 + Math.sin(performance.now() / 1000 * 3) * 0.8; }

            const inst = GAME_STATE.quantumInstability;
            overlayEl.style.background = `radial-gradient(ellipse at center, transparent ${55 - inst*20}%, rgba(0,0,0,${0.55 + inst*0.3}) 100%)`;
            vignetteEl.style.boxShadow = `inset 0 0 ${180 + inst*80}px ${60 + inst*50}px rgba(0,0,0,${0.7 + inst*0.25})`;
            chromaticEl.style.opacity = 0.08 + inst * 0.12;
            GAME_STATE.quantumInstability = Math.max(0, GAME_STATE.quantumInstability - deltaTime * 0.04);
            if (humGain) { const cv = GAME_STATE.totalChaos + GAME_STATE.quantumInstability; humGain.gain.value = 0.04 + cv * 0.06; humFilter.frequency.value = 200 - cv * 80; }
        }

        function render() { renderer.render(scene, camera); }

        function gameLoop() {
            requestAnimationFrame(gameLoop);
            update(Math.min(clock.getDelta(), 0.25));
            render();
        }

        // ─────────────────────────────────────
        // INIT
        // ─────────────────────────────────────
        function initGame() {
            GAME_STATE.currentLevel = 1; GAME_STATE.gridSize = 6; GAME_STATE.playerHasKey = false; GAME_STATE.levelComplete = false;
            GAME_STATE.gameActive = false; GAME_STATE.quantumInstability = 0; GAME_STATE.totalChaos = 0;
            GAME_STATE.jumpscareCooldown = 0; GAME_STATE.screenShakeAmount = 0; GAME_STATE.lastTunnelTime = 0;
            GAME_STATE.heartbeating = false; GAME_STATE.heartbeatTimer = 0;
            clearMaze();
            generateMaze(1);
            setupEntangledDoors();
            resetPlayer();
            camera.position.copy(playerPosition);
            camera.rotation.set(0, playerEuler.y, 0);
        }

        enterBtn.addEventListener('click', () => {
            startAudio();
            initGame();
            GAME_STATE.gameActive = true;
            splashEl.classList.add('hidden');
            hintEl.style.opacity = '1';
            hintEl.textContent = 'CLICK TO FOCUS - WASD TO MOVE - F TO INTERACT';
            setTimeout(() => { hintEl.style.opacity = '0'; renderer.domElement.requestPointerLock(); }, 3500);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initGame();
        gameLoop();
        splashEl.classList.remove('hidden');
        hintEl.style.opacity = '0';
    </script>
</body>
</html>
